[server]
bind = "127.0.0.1:8787"

[auth]
token_env = "COGENTLM_GATEWAY_TOKEN"
admin_token_env = "COGENTLM_GATEWAY_ADMIN_TOKEN"

[limits]
max_request_bytes = 1048576
history_capacity = 200

[cors]
allowed_origins = ["http://localhost:5173", "http://127.0.0.1:5173"]

[[aliases]]
name = "local"
operations = ["query", "chat"]

[aliases.limits]
max_concurrent_requests = 2
max_requests_per_minute = 60

[aliases.backend]
kind = "local_cogent_engine"
model_path = "models/local.gguf"

[aliases.backend.options]
context_key = "gateway-local"

[aliases.backend.runtime.context]
n_ctx = 2048
embeddings = false

[aliases.backend.runtime.scheduler]
continuous_batching = true
prefill_chunk_size = 0

[aliases.backend.runtime.cache]
mode = "live_slot_prefix"

[aliases.backend.runtime.observability]
runtime_metrics = true
backend_profiling = false

[[aliases]]
name = "local-embed"
operations = ["embed"]

[aliases.limits]
max_concurrent_requests = 2
max_requests_per_minute = 60

[aliases.backend]
kind = "local_cogent_engine"
model_path = "models/local.gguf"

[aliases.backend.options]
embedding_context_key = "gateway-embed"
normalize_embeddings = true

[aliases.backend.runtime.context]
n_ctx = 2048
embeddings = true

[aliases.backend.runtime.scheduler]
continuous_batching = true
prefill_chunk_size = 0

[aliases.backend.runtime.cache]
mode = "live_slot_prefix"

[aliases.backend.runtime.observability]
runtime_metrics = true
backend_profiling = false
