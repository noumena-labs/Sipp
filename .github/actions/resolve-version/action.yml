name: Resolve aligned package version
description: >-
  Reads the workspace manifests (Cargo workspace + internal path deps, the
  Python pyproject, and the web/node package.json files), asserts every version
  field is identical, requires a stable x.y.z value, and emits it as `version`.
  Callers derive their own release tag or dev version from this base.
outputs:
  version:
    description: The single aligned stable x.y.z version shared by every manifest
    value: ${{ steps.resolve.outputs.version }}
runs:
  using: composite
  steps:
    - name: Resolve aligned version
      id: resolve
      shell: bash
      run: |
        set -euo pipefail
        version="$(node .github/scripts/package-versions.mjs resolve)"
        echo "version=$version" >> "$GITHUB_OUTPUT"
