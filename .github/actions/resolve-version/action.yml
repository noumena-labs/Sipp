name: Resolve aligned package version
description: >-
  Reads the workspace manifests (Cargo workspace + internal path deps, the
  Python pyproject, and the web/node package.json files), asserts every version
  field is identical, requires a stable x.y.z value, and emits it as `version`.
  Callers derive their own release tag or dev version from this base.
outputs:
  version:
    description: The single aligned stable x.y.z version shared by every manifest
    value: ${{ steps.resolve.outputs.version }}
runs:
  using: composite
  steps:
    - name: Resolve aligned version
      id: resolve
      shell: bash
      run: |
        set -euo pipefail
        version="$(node --input-type=module <<'NODE'
        import { readFileSync } from 'node:fs';

        function readJsonVersion(path) {
          return JSON.parse(readFileSync(path, 'utf8')).version;
        }

        const cargo = readFileSync('Cargo.toml', 'utf8');
        const cargoWorkspace = cargo.match(/^\[workspace\.package\][\s\S]*?^version = "([^"]+)"/m)?.[1];
        const cargoSipp = cargo.match(/^sipp = \{ path = "crates\/sipp", version = "([^"]+)"/m)?.[1];
        const cargoSys = cargo.match(/^sipp-sys = \{ path = "crates\/sys", version = "([^"]+)"/m)?.[1];
        const cargoGateway = cargo.match(/^sipp-gateway = \{ path = "lib\/gateway", version = "([^"]+)"/m)?.[1];
        const cargoBindingDto = cargo.match(/^sipp-binding-dto = \{ path = "lib\/binding-dto", version = "([^"]+)"/m)?.[1];
        const pyproject = readFileSync('lib/python/pyproject.toml', 'utf8');
        const python = pyproject.match(/^version = "([^"]+)"/m)?.[1];
        const pythonBackendExtras = [...pyproject.matchAll(/sipp-backend-(?:cuda|metal|vulkan)==([^";\s]+)/g)]
          .map((match) => match[1]);
        const pythonBackendPackages = Object.fromEntries(
          ['cuda', 'metal', 'vulkan'].map((backend) => {
            const backendPyproject = readFileSync(`lib/python/backends/${backend}/pyproject.toml`, 'utf8');
            return [
              `pythonBackendPackage${backend}`,
              backendPyproject.match(/^version = "([^"]+)"/m)?.[1],
            ];
          })
        );
        const versions = {
          cargoBindingDto,
          cargoGateway,
          cargoSipp,
          cargoSys,
          cargoWorkspace,
          node: readJsonVersion('lib/node/package.json'),
          python,
          ...pythonBackendPackages,
          web: readJsonVersion('lib/web/package.json'),
        };
        for (const [index, extraVersion] of pythonBackendExtras.entries()) {
          versions[`pythonBackendExtra${index}`] = extraVersion;
        }
        const missing = Object.entries(versions)
          .filter(([, value]) => value == null)
          .map(([name]) => name);
        if (missing.length > 0) {
          throw new Error(`Missing version field(s): ${missing.join(', ')}`);
        }

        const unique = [...new Set(Object.values(versions))];
        if (unique.length !== 1) {
          throw new Error(`Package versions are not aligned: ${JSON.stringify(versions)}`);
        }

        const version = unique[0];
        if (!/^\d+\.\d+\.\d+$/.test(version)) {
          throw new Error(`Version must be a stable x.y.z value, got ${version}`);
        }

        console.error(`Resolved aligned version ${version}`);
        console.log(version);
        NODE
        )"
        echo "version=$version" >> "$GITHUB_OUTPUT"
