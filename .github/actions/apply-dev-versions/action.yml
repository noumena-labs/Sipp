name: Apply dev package versions
description: >-
  Writes the computed dev versions into Cargo, npm package manifests, and the
  Python pyproject so staged artifacts carry the dev channel version.
inputs:
  npm-version:
    description: Dev SemVer version for Cargo and JavaScript package manifests
    required: true
  python-version:
    description: PEP 440 dev version for lib/python/pyproject.toml
    required: true
runs:
  using: composite
  steps:
    - name: Rewrite package versions
      shell: bash
      env:
        DEV_VERSION: ${{ inputs.npm-version }}
        PYTHON_DEV_VERSION: ${{ inputs.python-version }}
      run: |
        set -euo pipefail
        node --input-type=module <<'NODE'
        import { readFileSync, writeFileSync } from 'node:fs';
        const jsonFiles = ['lib/web/package.json', 'lib/node/package.json'];
        for (const path of jsonFiles) {
          const pkg = JSON.parse(readFileSync(path, 'utf8'));
          pkg.version = process.env.DEV_VERSION;
          writeFileSync(path, `${JSON.stringify(pkg, null, 2)}\n`);
        }
        const pyprojectPath = 'lib/python/pyproject.toml';
        const pyproject = readFileSync(pyprojectPath, 'utf8')
          .replace(
            /^version = ".*"$/m,
            `version = "${process.env.PYTHON_DEV_VERSION}"`
          )
          .replace(
            /(sipp-backend-(?:cuda|metal|vulkan)==)[^";\s]+/g,
            `$1${process.env.PYTHON_DEV_VERSION}`
          );
        writeFileSync(pyprojectPath, pyproject);
        for (const backend of ['cuda', 'metal', 'vulkan']) {
          const backendPyprojectPath = `lib/python/backends/${backend}/pyproject.toml`;
          const backendPyproject = readFileSync(backendPyprojectPath, 'utf8').replace(
            /^version = ".*"$/m,
            `version = "${process.env.PYTHON_DEV_VERSION}"`
          );
          writeFileSync(backendPyprojectPath, backendPyproject);
        }

        const cargoPath = 'Cargo.toml';
        const cargo = readFileSync(cargoPath, 'utf8')
          .replace(
            /^version = ".*"$/m,
            `version = "${process.env.DEV_VERSION}"`
          )
          .replace(
            /(sipp = \{ path = "crates\/sipp", version = )".*"/,
            `$1"${process.env.DEV_VERSION}"`
          )
          .replace(
            /(sipp-sys = \{ path = "crates\/sys", version = )".*"/,
            `$1"${process.env.DEV_VERSION}"`
          )
          .replace(
            /(sipp-gateway = \{ path = "lib\/gateway", version = )".*"/,
            `$1"${process.env.DEV_VERSION}"`
          )
          .replace(
            /(sipp-binding-dto = \{ path = "lib\/binding-dto", version = )".*"/,
            `$1"${process.env.DEV_VERSION}"`
          );
        writeFileSync(cargoPath, cargo);
        NODE
