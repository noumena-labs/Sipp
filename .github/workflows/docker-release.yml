name: Build and Publish Gateway Server Release Images

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  build-and-push:
    name: Build & Push Gateway Images
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - backend: cpu
            builder: rust:bookworm
            runtime: debian:bookworm-slim
            rustup: "0"
            tag_suffix: cpu
          - backend: vulkan
            builder: rust:bookworm
            runtime: ubuntu:22.04
            rustup: "0"
            tag_suffix: vulkan
          - backend: cuda
            builder: nvidia/cuda:12.2.2-devel-ubuntu22.04
            runtime: nvidia/cuda:12.2.2-runtime-ubuntu22.04
            rustup: "1"
            tag_suffix: cuda

    steps:
      - name: Check out repository
        uses: actions/checkout@v6.0.2
        with:
          submodules: false

      - name: Check out private llama.cpp submodule
        env:
          LLAMA_CPP_INTERNAL_DEPLOY_KEY: ${{ secrets.LLAMA_CPP_INTERNAL_DEPLOY_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${LLAMA_CPP_INTERNAL_DEPLOY_KEY:-}" ]; then
            echo "::error::Set LLAMA_CPP_INTERNAL_DEPLOY_KEY to a read-only deploy key for noumena-labs/llama.cpp."
            exit 1
          fi
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$LLAMA_CPP_INTERNAL_DEPLOY_KEY" > ~/.ssh/llama_cpp_internal
          chmod 600 ~/.ssh/llama_cpp_internal
          ssh-keyscan github.com >> ~/.ssh/known_hosts
          GIT_SSH_COMMAND="ssh -i ~/.ssh/llama_cpp_internal -o IdentitiesOnly=yes" git submodule sync --recursive
          GIT_SSH_COMMAND="ssh -i ~/.ssh/llama_cpp_internal -o IdentitiesOnly=yes" git submodule update --init --recursive

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry (GHCR)
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set Docker image name
        id: image
        shell: bash
        run: |
          set -euo pipefail
          image_name="ghcr.io/${GITHUB_REPOSITORY,,}/gateway-server"
          ref_tag="$(printf '%s' "$GITHUB_REF_NAME" | tr '[:upper:]' '[:lower:]' | sed -E 's/[^a-z0-9_.-]+/-/g; s/^-+//; s/-+$//')"
          echo "name=$image_name" >> "$GITHUB_OUTPUT"
          echo "ref_tag=$ref_tag" >> "$GITHUB_OUTPUT"

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/gateway-server/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          build-args: |
            COGENTLM_GATEWAY_BACKEND=${{ matrix.backend }}
            COGENTLM_GATEWAY_BUILDER_IMAGE=${{ matrix.builder }}
            COGENTLM_GATEWAY_RUNTIME_IMAGE=${{ matrix.runtime }}
            COGENTLM_GATEWAY_INSTALL_RUSTUP=${{ matrix.rustup }}
          tags: |
            ${{ steps.image.outputs.name }}:latest-${{ matrix.tag_suffix }}
            ${{ steps.image.outputs.name }}:${{ steps.image.outputs.ref_tag }}-${{ matrix.tag_suffix }}

  release-mac-metal:
    name: Build & Release macOS Metal Native Binary
    runs-on: macos-14
    steps:
      - name: Check out repository
        uses: actions/checkout@v6.0.2
        with:
          submodules: false

      - name: Check out private llama.cpp submodule
        env:
          LLAMA_CPP_INTERNAL_DEPLOY_KEY: ${{ secrets.LLAMA_CPP_INTERNAL_DEPLOY_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${LLAMA_CPP_INTERNAL_DEPLOY_KEY:-}" ]; then
            echo "::error::Set LLAMA_CPP_INTERNAL_DEPLOY_KEY to a read-only deploy key for noumena-labs/llama.cpp."
            exit 1
          fi
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$LLAMA_CPP_INTERNAL_DEPLOY_KEY" > ~/.ssh/llama_cpp_internal
          chmod 600 ~/.ssh/llama_cpp_internal
          ssh-keyscan github.com >> ~/.ssh/known_hosts
          GIT_SSH_COMMAND="ssh -i ~/.ssh/llama_cpp_internal -o IdentitiesOnly=yes" git submodule sync --recursive
          GIT_SSH_COMMAND="ssh -i ~/.ssh/llama_cpp_internal -o IdentitiesOnly=yes" git submodule update --init --recursive

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2.2.0
        with:
          bun-version: 1.3.11

      - name: Set up CMake and Ninja
        uses: lukka/get-cmake@latest

      - name: Install workspace dependencies
        run: bun install --frozen-lockfile

      - name: Build Gateway Server (Metal)
        run: cargo xtask build gateway-server --backend metal

      - name: Compress artifacts
        run: |
          cd .build/artifacts/gateway-server
          zip -r ../../../cogentlm-gateway-macos-metal.zip .

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: cogentlm-gateway-macos-metal.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload macOS Metal artifact
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v6.0.0
        with:
          name: cogentlm-gateway-macos-metal
          path: cogentlm-gateway-macos-metal.zip
