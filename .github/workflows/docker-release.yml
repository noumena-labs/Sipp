name: Build and Publish Gateway Server Release Images

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  build-and-push:
    name: Build & Push Gateway Images
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - backend: cpu
            builder: rust:bookworm
            runtime: debian:bookworm-slim
            rustup: "0"
            tag_suffix: cpu
            cuda_architectures: ""
          - backend: vulkan
            builder: rust:bookworm
            runtime: ubuntu:22.04
            rustup: "0"
            tag_suffix: vulkan
            cuda_architectures: ""
          - backend: cuda
            builder: nvidia/cuda:13.3.0-devel-ubuntu24.04
            runtime: nvidia/cuda:13.3.0-runtime-ubuntu24.04
            rustup: "1"
            tag_suffix: cuda
            # Portable cloud GPU architectures for CUDA 13 release images.
            cuda_architectures: "75-virtual;80-virtual;86-real;89-real;90-virtual;120a-real;121a-real"

    steps:
      - name: Check out repository
        uses: actions/checkout@v6.0.2
        with:
          submodules: recursive

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry (GHCR)
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set Docker image name
        id: image
        shell: bash
        run: |
          set -euo pipefail
          image_name="ghcr.io/${GITHUB_REPOSITORY,,}/gateway-server"
          ref_tag="$(printf '%s' "$GITHUB_REF_NAME" | tr '[:upper:]' '[:lower:]' | sed -E 's/[^a-z0-9_.-]+/-/g; s/^-+//; s/-+$//')"
          echo "name=$image_name" >> "$GITHUB_OUTPUT"
          echo "ref_tag=$ref_tag" >> "$GITHUB_OUTPUT"

      - name: Build and push Docker image
        uses: docker/build-push-action@v6.18.0
        with:
          context: .
          file: apps/gateway-server/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          cache-from: type=gha,scope=${{ matrix.tag_suffix }}
          cache-to: type=gha,mode=max,scope=${{ matrix.tag_suffix }}
          build-args: |
            SIPP_GATEWAY_BACKEND=${{ matrix.backend }}
            SIPP_GATEWAY_BUILDER_IMAGE=${{ matrix.builder }}
            SIPP_GATEWAY_RUNTIME_IMAGE=${{ matrix.runtime }}
            SIPP_GATEWAY_INSTALL_RUSTUP=${{ matrix.rustup }}
            SIPP_CUDA_ARCHITECTURES=${{ matrix.cuda_architectures }}
          tags: |
            ${{ steps.image.outputs.name }}:latest-${{ matrix.tag_suffix }}
            ${{ steps.image.outputs.name }}:${{ steps.image.outputs.ref_tag }}-${{ matrix.tag_suffix }}

  release-mac-metal:
    name: Build & Release macOS Metal Native Binary
    runs-on: macos-14
    steps:
      - name: Check out repository
        uses: actions/checkout@v6.0.2
        with:
          submodules: recursive

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2.2.0
        with:
          bun-version: 1.3.11

      - name: Set up CMake and Ninja
        uses: lukka/get-cmake@v4.3.1

      - name: Set up compiler cache
        uses: hendrikmuhs/ccache-action@v1.2.23
        with:
          key: docker-release-mac-metal
          max-size: 3G

      - name: Install workspace dependencies
        run: bun install --frozen-lockfile

      - name: Build Gateway Server (Metal)
        run: cargo xtask build gateway-server --backend metal

      - name: Compress artifacts
        run: |
          cd .build/artifacts/gateway-server
          zip -r ../../../sipp-gateway-macos-metal.zip .

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: sipp-gateway-macos-metal.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload macOS Metal artifact
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v6.0.0
        with:
          name: sipp-gateway-macos-metal
          path: sipp-gateway-macos-metal.zip
