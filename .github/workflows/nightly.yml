name: Nightly

on:
  # schedule:
    # - cron: "0 7 * * *"
  workflow_dispatch:

permissions:
  contents: read
  packages: read

concurrency:
  group: nightly-${{ github.ref }}
  cancel-in-progress: false

jobs:
  full-test:
    name: Full CPU test workflow
    runs-on: ubuntu-latest
    env:
      CE_WASM_BUILD_PARALLEL_LEVEL: "2"
    steps:
      - name: Check out repository
        uses: actions/checkout@v6.0.2
        with:
          submodules: recursive

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-emscripten
          components: rust-src

      - name: Set up Node
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 22

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2.2.0
        with:
          bun-version: 1.3.11

      - name: Set up CMake and Ninja
        uses: lukka/get-cmake@v4.3.1

      - name: Set up compiler cache
        if: ${{ runner.os != 'Windows' }}
        uses: hendrikmuhs/ccache-action@v1.2.23
        with:
          key: nightly
          max-size: 3G

      - name: Set up Emscripten
        uses: emscripten-core/setup-emsdk@v16
        with:
          actions-cache-folder: emsdk-cache

      - name: Cache Cargo and native build outputs
        uses: actions/cache@v5.0.5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            .build/cargo
            .build/cmake
            .build/c
          key: cargo-nightly-${{ runner.os }}-${{ hashFiles('Cargo.lock', '.cargo/config.toml', 'crates/**/Cargo.toml', 'lib/**/Cargo.toml', 'apps/cli/Cargo.toml', 'xtask/Cargo.toml', 'bindings/**/Cargo.toml') }}
          restore-keys: |
            cargo-nightly-${{ runner.os }}-

      - name: Cache JavaScript dependencies
        uses: actions/cache@v5.0.5
        with:
          path: |
            ~/.bun/install/cache
            node_modules
            lib/web/node_modules
            lib/node/node_modules
            bindings/node/node_modules
            demos/*/node_modules
            tools/*/node_modules
            examples/web/node_modules
          key: bun-nightly-${{ runner.os }}-${{ hashFiles('bun.lock', 'bindings/node/bun.lock', 'package.json', 'lib/node/package.json', 'lib/web/package.json', 'bindings/node/package.json', 'demos/*/package.json', 'tools/*/package.json', 'examples/web/package.json') }}
          restore-keys: |
            bun-nightly-${{ runner.os }}-

      - name: Cache xtask toolchains
        uses: actions/cache@v5.0.5
        with:
          path: |
            .build/toolchain
            .build/uv-cache
          key: xtask-toolchain-nightly-${{ runner.os }}-${{ hashFiles('xtask/src/toolchains/*.rs') }}
          restore-keys: |
            xtask-toolchain-nightly-${{ runner.os }}-

      - name: Cache sample models
        uses: actions/cache@v5.0.5
        with:
          path: .build/models
          key: sample-models-nightly-${{ runner.os }}-${{ hashFiles('xtask/src/sample_model.rs') }}
          restore-keys: |
            sample-models-nightly-${{ runner.os }}-

      - name: Install JavaScript workspace dependencies
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bun install --frozen-lockfile

      - name: Run full test workflow
        run: |
          cargo xtask --plain test unit group full
          cargo xtask --plain test smoke group full --backend cpu
