name: Release cogentlm

on:
  workflow_dispatch:
    inputs:
      bump:
        description: Version bump to apply
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major
          - prerelease
      prerelease_id:
        description: Prerelease id used when bump is prerelease
        required: false
        default: beta
        type: string
      npm_tag:
        description: npm dist-tag to publish
        required: true
        default: latest
        type: string
      dry_run:
        description: Build and dry-run publish without committing, tagging, or publishing
        required: false
        default: true
        type: boolean

permissions:
  contents: write
  packages: write
  id-token: write

concurrency:
  group: release-cogentlm
  cancel-in-progress: false

jobs:
  release-cogentlm:
    name: Release cogentlm
    runs-on: ubuntu-latest
    env:
      CE_WASM_BUILD_PARALLEL_LEVEL: "2"
    steps:
      - name: Require master
        run: |
          if [ "${GITHUB_REF}" != "refs/heads/master" ]; then
            echo "Release workflow must run from master."
            exit 1
          fi

      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: false
          token: ${{ secrets.RELEASE_GITHUB_TOKEN != '' && secrets.RELEASE_GITHUB_TOKEN || github.token }}

      - name: Check out private llama.cpp submodule
        env:
          LLAMA_CPP_INTERNAL_DEPLOY_KEY: ${{ secrets.LLAMA_CPP_INTERNAL_DEPLOY_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${LLAMA_CPP_INTERNAL_DEPLOY_KEY:-}" ]; then
            echo "::error::Set LLAMA_CPP_INTERNAL_DEPLOY_KEY to a read-only deploy key for noumena-labs/llama.cpp.internal."
            exit 1
          fi

          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$LLAMA_CPP_INTERNAL_DEPLOY_KEY" > ~/.ssh/llama_cpp_internal
          chmod 600 ~/.ssh/llama_cpp_internal
          ssh-keyscan github.com >> ~/.ssh/known_hosts

          GIT_SSH_COMMAND="ssh -i ~/.ssh/llama_cpp_internal -o IdentitiesOnly=yes" git submodule sync --recursive
          GIT_SSH_COMMAND="ssh -i ~/.ssh/llama_cpp_internal -o IdentitiesOnly=yes" git submodule update --init --recursive

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://npm.pkg.github.com
          scope: "@noumena-labs"

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install native build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build

      - name: Set up Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: latest

      - name: Install dependencies
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bun install --frozen-lockfile

      - name: Bump package version
        id: version
        env:
          BUMP: ${{ inputs.bump }}
          PRERELEASE_ID: ${{ inputs.prerelease_id }}
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          node <<'NODE'
          const fs = require('node:fs');

          const packageJsonPath = 'packages/cogentlm/package.json';
          const bump = process.env.BUMP;
          const prereleaseId = process.env.PRERELEASE_ID || 'beta';
          const packageJson = JSON.parse(fs.readFileSync(packageJsonPath, 'utf8'));
          const match = packageJson.version.match(/^(\d+)\.(\d+)\.(\d+)(?:-([0-9A-Za-z.-]+))?$/);

          if (!match) {
            throw new Error(`Unsupported version format: ${packageJson.version}`);
          }

          let major = Number(match[1]);
          let minor = Number(match[2]);
          let patch = Number(match[3]);
          const prerelease = match[4];

          switch (bump) {
            case 'major':
              major += 1;
              minor = 0;
              patch = 0;
              packageJson.version = `${major}.${minor}.${patch}`;
              break;
            case 'minor':
              minor += 1;
              patch = 0;
              packageJson.version = `${major}.${minor}.${patch}`;
              break;
            case 'patch':
              if (prerelease) {
                packageJson.version = `${major}.${minor}.${patch}`;
              } else {
                patch += 1;
                packageJson.version = `${major}.${minor}.${patch}`;
              }
              break;
            case 'prerelease': {
              const prereleaseParts = prerelease?.split('.') ?? [];
              if (prereleaseParts[0] === prereleaseId && /^\d+$/.test(prereleaseParts[1] ?? '')) {
                prereleaseParts[1] = String(Number(prereleaseParts[1]) + 1);
              } else {
                patch += 1;
                prereleaseParts.length = 0;
                prereleaseParts.push(prereleaseId, '0');
              }
              packageJson.version = `${major}.${minor}.${patch}-${prereleaseParts.join('.')}`;
              break;
            }
            default:
              throw new Error(`Unsupported bump: ${bump}`);
          }

          fs.writeFileSync(packageJsonPath, `${JSON.stringify(packageJson, null, 2)}\n`);
          console.log(packageJson.version);
          NODE

          VERSION="$(node -p "require('./packages/cogentlm/package.json').version")"
          bun install --lockfile-only
          echo "Resolved release version: $VERSION"
          git status --short -- packages/cogentlm/package.json bun.lock
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=cogentlm-v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Check npm Registry version availability
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          VIEW_LOG="$RUNNER_TEMP/npm-registry-view.log"
          # Check 'cogentlm' (unscoped) on the main registry
          if npm view "cogentlm@$VERSION" version --registry https://registry.npmjs.org >"$VIEW_LOG" 2>&1; then
            echo "cogentlm@$VERSION already exists on the npm Registry."
            exit 1
          fi

          if ! grep -Eq "E404|404 Not Found|is not in the npm registry" "$VIEW_LOG"; then
            cat "$VIEW_LOG"
            exit 1
          fi

      - name: Run package tests
        run: bun test packages/cogentlm/src

      - name: Build and validate release package
        env:
          COGENTLM_PACKAGE_ROOT: node_modules/cogentlm
        run: bun run --filter=@noumena-labs/cogentlm release:prepare

      - name: Run built package smoke test
        run: |
          node --input-type=module <<'NODE'
          const pkg = await import('./packages/cogentlm/dist/esm/index.js');
          if (typeof pkg.CogentEngine?.create !== 'function') {
            throw new Error('CogentEngine.create export is missing from the built package.');
          }
          NODE

      - name: Build browser consumer smoke app
        run: bun run --filter=cogentlm-examples build

      - name: Validate npm Registry publish (dry-run)
        env:
          NPM_TAG: ${{ inputs.npm_tag }}
        working-directory: packages/cogentlm
        run: |
          set -euo pipefail
          PACKAGE_JSON_BACKUP="$RUNNER_TEMP/cogentlm-package.json"
          cp package.json "$PACKAGE_JSON_BACKUP"

          restore_package_json() {
            cp "$PACKAGE_JSON_BACKUP" package.json
          }
          trap restore_package_json EXIT

          # Patch package.json for dry-run
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.name = 'cogentlm';
            pkg.publishConfig = { registry: 'https://registry.npmjs.org', access: 'public' };
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2));
          "
          # Ensure auth for dry-run if token is available
          if [ -n "${NODE_AUTH_TOKEN:-}" ]; then
            printf "//registry.npmjs.org/:_authToken=%s\n" "$NODE_AUTH_TOKEN" > "$RUNNER_TEMP/npmrc_registry"
            export NPM_CONFIG_USERCONFIG="$RUNNER_TEMP/npmrc_registry"
          fi
          npm publish --dry-run --registry https://registry.npmjs.org --tag "$NPM_TAG" --provenance
          restore_package_json
          trap - EXIT

      - name: Commit version and create tag
        if: ${{ inputs.dry_run == false }}
        env:
          VERSION: ${{ steps.version.outputs.version }}
          RELEASE_TAG: ${{ steps.version.outputs.tag }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          CURRENT_VERSION="$(node -p "require('./packages/cogentlm/package.json').version")"
          if [ "$CURRENT_VERSION" != "$VERSION" ]; then
            echo "::error::Expected packages/cogentlm/package.json version $VERSION, but found $CURRENT_VERSION."
            git status --short -- packages/cogentlm/package.json bun.lock
            exit 1
          fi

          git add packages/cogentlm/package.json bun.lock
          if git diff --cached --quiet -- packages/cogentlm/package.json bun.lock; then
            echo "No version files changed; cogentlm v$VERSION is already present on HEAD."
          else
            git commit -m "chore(release): cogentlm v$VERSION"
            git push origin HEAD:master
          fi

          git fetch --tags origin
          if git rev-parse -q --verify "refs/tags/$RELEASE_TAG" >/dev/null; then
            TAG_TARGET="$(git rev-list -n 1 "$RELEASE_TAG")"
            HEAD_COMMIT="$(git rev-parse HEAD)"
            if [ "$TAG_TARGET" != "$HEAD_COMMIT" ]; then
              echo "::error::Tag $RELEASE_TAG already exists but does not point at HEAD."
              exit 1
            fi
            echo "Tag $RELEASE_TAG already points at HEAD."
          else
            git tag -a "$RELEASE_TAG" -m "cogentlm v$VERSION"
            git push origin "$RELEASE_TAG"
          fi

      - name: Publish to npm Registry
        if: ${{ inputs.dry_run == false }}
        env:
          NPM_TAG: ${{ inputs.npm_tag }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        working-directory: packages/cogentlm
        run: |
          set -euo pipefail
          # Patch package.json for public release
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.name = 'cogentlm';
            pkg.publishConfig = { registry: 'https://registry.npmjs.org', access: 'public' };
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2));
          "
          # Ensure auth for registry
          if [ -n "${NODE_AUTH_TOKEN:-}" ]; then
            printf "//registry.npmjs.org/:_authToken=%s\n" "$NODE_AUTH_TOKEN" > "$RUNNER_TEMP/npmrc_registry"
            export NPM_CONFIG_USERCONFIG="$RUNNER_TEMP/npmrc_registry"
          fi
          # Publish with provenance (Ready for Trusted Publishing)
          # We use the token for auth, but --provenance links it to this GitHub Action
          # npm publish --registry https://registry.npmjs.org --tag "$NPM_TAG" --provenance

          # Disabling provenance as this is not supported for github private packages
          npm publish --registry https://registry.npmjs.org --tag "$NPM_TAG"
