name: Release cogentlm

on:
  workflow_dispatch:
    inputs:
      bump:
        description: Version bump to apply
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major
          - prerelease
      prerelease_id:
        description: Prerelease id used when bump is prerelease
        required: false
        default: beta
        type: string
      npm_tag:
        description: npm dist-tag to publish
        required: true
        default: latest
        type: string
      dry_run:
        description: Build and dry-run publish without committing, tagging, or publishing
        required: false
        default: true
        type: boolean

permissions:
  contents: write
  packages: write

concurrency:
  group: release-cogentlm
  cancel-in-progress: false

jobs:
  release-cogentlm:
    name: Release cogentlm
    runs-on: ubuntu-latest
    env:
      CE_WASM_BUILD_PARALLEL_LEVEL: "2"
    steps:
      - name: Require master
        run: |
          if [ "${GITHUB_REF}" != "refs/heads/master" ]; then
            echo "Release workflow must run from master."
            exit 1
          fi

      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: false
          token: ${{ secrets.RELEASE_GITHUB_TOKEN != '' && secrets.RELEASE_GITHUB_TOKEN || github.token }}

      - name: Check out private llama.cpp submodule
        env:
          LLAMA_CPP_INTERNAL_DEPLOY_KEY: ${{ secrets.LLAMA_CPP_INTERNAL_DEPLOY_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${LLAMA_CPP_INTERNAL_DEPLOY_KEY:-}" ]; then
            echo "::error::Set LLAMA_CPP_INTERNAL_DEPLOY_KEY to a read-only deploy key for noumena-labs/llama.cpp.internal."
            exit 1
          fi

          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$LLAMA_CPP_INTERNAL_DEPLOY_KEY" > ~/.ssh/llama_cpp_internal
          chmod 600 ~/.ssh/llama_cpp_internal
          ssh-keyscan github.com >> ~/.ssh/known_hosts

          GIT_SSH_COMMAND="ssh -i ~/.ssh/llama_cpp_internal -o IdentitiesOnly=yes" git submodule sync --recursive
          GIT_SSH_COMMAND="ssh -i ~/.ssh/llama_cpp_internal -o IdentitiesOnly=yes" git submodule update --init --recursive

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install native build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build

      - name: Set up Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: latest

      - name: Install dependencies
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bun install --frozen-lockfile

      - name: Bump package version
        id: version
        env:
          BUMP: ${{ inputs.bump }}
          PRERELEASE_ID: ${{ inputs.prerelease_id }}
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          cd packages/cogentlm
          if [ "$BUMP" = "prerelease" ]; then
            npm version prerelease --preid "${PRERELEASE_ID:-beta}" --no-git-tag-version
          else
            npm version "$BUMP" --no-git-tag-version
          fi
          VERSION="$(node -p "require('./package.json').version")"
          cd ../..
          bun install --lockfile-only
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=cogentlm-v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Check GitHub Packages version availability
        env:
          VERSION: ${{ steps.version.outputs.version }}
          NODE_AUTH_TOKEN: ${{ secrets.PACKAGE_PUBLISH_TOKEN != '' && secrets.PACKAGE_PUBLISH_TOKEN || github.token }}
        run: |
          set -euo pipefail

          printf "@noumena-labs:registry=https://npm.pkg.github.com\n//npm.pkg.github.com/:_authToken=%s\n" "$NODE_AUTH_TOKEN" > "$RUNNER_TEMP/npmrc"
          export NPM_CONFIG_USERCONFIG="$RUNNER_TEMP/npmrc"

          VIEW_LOG="$RUNNER_TEMP/npm-view.log"
          if npm view "@noumena-labs/cogentlm@$VERSION" version --registry https://npm.pkg.github.com >"$VIEW_LOG" 2>&1; then
            echo "@noumena-labs/cogentlm@$VERSION already exists on GitHub Packages."
            exit 1
          fi

          if ! grep -Eq "E404|404 Not Found" "$VIEW_LOG"; then
            cat "$VIEW_LOG"
            exit 1
          fi

      - name: Run package tests
        run: bun test packages/cogentlm/src

      - name: Build and validate release package
        run: bun run --filter=@noumena-labs/cogentlm release:prepare

      - name: Run built package smoke test
        run: |
          node --input-type=module <<'NODE'
          const pkg = await import('./packages/cogentlm/dist/esm/index.js');
          if (typeof pkg.CogentEngine?.create !== 'function') {
            throw new Error('CogentEngine.create export is missing from the built package.');
          }
          NODE

      - name: Build browser consumer smoke app
        run: bun run --filter=cogentlm-examples build

      - name: Configure GitHub Packages authentication
        env:
          NODE_AUTH_TOKEN: ${{ secrets.PACKAGE_PUBLISH_TOKEN != '' && secrets.PACKAGE_PUBLISH_TOKEN || github.token }}
        run: |
          set -euo pipefail
          if [ -z "${NODE_AUTH_TOKEN:-}" ]; then
            echo "Set PACKAGE_PUBLISH_TOKEN or allow the workflow GITHUB_TOKEN to publish packages."
            exit 1
          fi
          printf "@noumena-labs:registry=https://npm.pkg.github.com\n//npm.pkg.github.com/:_authToken=%s\n" "$NODE_AUTH_TOKEN" > "$RUNNER_TEMP/npmrc"
          echo "NPM_CONFIG_USERCONFIG=$RUNNER_TEMP/npmrc" >> "$GITHUB_ENV"

      - name: Validate GitHub Packages publish
        env:
          NPM_TAG: ${{ inputs.npm_tag }}
        working-directory: packages/cogentlm
        run: npm publish --dry-run --registry https://npm.pkg.github.com --tag "$NPM_TAG"

      - name: Commit version and create tag
        if: ${{ inputs.dry_run == false }}
        env:
          VERSION: ${{ steps.version.outputs.version }}
          RELEASE_TAG: ${{ steps.version.outputs.tag }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add packages/cogentlm/package.json bun.lock
          git commit -m "chore(release): cogentlm v$VERSION"
          git tag -a "$RELEASE_TAG" -m "cogentlm v$VERSION"
          git push origin HEAD:master
          git push origin "$RELEASE_TAG"

      - name: Publish to GitHub Packages
        if: ${{ inputs.dry_run == false }}
        env:
          NPM_TAG: ${{ inputs.npm_tag }}
        working-directory: packages/cogentlm
        run: npm publish --registry https://npm.pkg.github.com --tag "$NPM_TAG"
