name: CI

on:
  pull_request:
    branches:
      - master
  push:
    branches:
      - master

permissions:
  contents: read
  packages: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  public-validate:
    name: Public contributor gate
    if: ${{ github.event_name == 'pull_request' }}
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6.0.2
        with:
          submodules: false

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov

      - name: Cache Cargo and xtask outputs
        uses: actions/cache@v5.0.5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            .build/cargo
            .build/xtask
          key: cargo-public-ci-${{ runner.os }}-${{ hashFiles('Cargo.lock', '.cargo/config.toml', 'xtask/Cargo.toml', 'xtask/src/**/*.rs') }}
          restore-keys: |
            cargo-public-ci-${{ runner.os }}-

      - name: Run public contributor test profile
        run: cargo xtask --plain test unit suite xtask

  internal-validate:
    name: Internal CI gate
    if: ${{ github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository) }}
    runs-on: ubuntu-latest
    env:
      CE_WASM_BUILD_PARALLEL_LEVEL: "2"
    steps:
      - name: Check out repository
        uses: actions/checkout@v6.0.2
        with:
          submodules: recursive

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-emscripten
          components: rust-src, llvm-tools-preview

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov

      - name: Set up Node
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 22

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2.2.0
        with:
          bun-version: 1.3.11

      - name: Set up CMake and Ninja
        uses: lukka/get-cmake@v4.3.1

      - name: Set up compiler cache
        if: ${{ runner.os != 'Windows' }}
        uses: hendrikmuhs/ccache-action@v1.2.23
        with:
          key: ci-internal
          max-size: 3G

      - name: Set up Emscripten
        uses: emscripten-core/setup-emsdk@v16
        with:
          actions-cache-folder: emsdk-cache

      - name: Cache Cargo and native build outputs
        uses: actions/cache@v5.0.5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            .build/cargo
            .build/cmake
            .build/c
          key: cargo-ci-${{ runner.os }}-${{ hashFiles('Cargo.lock', '.cargo/config.toml', 'crates/**/Cargo.toml', 'lib/**/Cargo.toml', 'apps/cli/Cargo.toml', 'xtask/Cargo.toml', 'bindings/**/Cargo.toml') }}
          restore-keys: |
            cargo-ci-${{ runner.os }}-

      - name: Cache JavaScript dependencies
        uses: actions/cache@v5.0.5
        with:
          path: |
            ~/.bun/install/cache
            node_modules
            lib/web/node_modules
            lib/node/node_modules
            bindings/node/node_modules
            demos/*/node_modules
            tools/*/node_modules
            examples/web/node_modules
          key: bun-ci-${{ runner.os }}-${{ hashFiles('bun.lock', 'bindings/node/bun.lock', 'package.json', 'lib/node/package.json', 'lib/web/package.json', 'bindings/node/package.json', 'demos/*/package.json', 'tools/*/package.json', 'examples/web/package.json') }}
          restore-keys: |
            bun-ci-${{ runner.os }}-

      - name: Cache xtask toolchains
        uses: actions/cache@v5.0.5
        with:
          path: |
            .build/toolchain
            .build/uv-cache
          key: xtask-toolchain-ci-${{ runner.os }}-${{ hashFiles('xtask/src/toolchains/*.rs') }}
          restore-keys: |
            xtask-toolchain-ci-${{ runner.os }}-

      - name: Cache sample models
        uses: actions/cache@v5.0.5
        with:
          path: .build/models
          key: sample-models-ci-${{ runner.os }}-${{ hashFiles('xtask/src/sample_model.rs') }}
          restore-keys: |
            sample-models-ci-${{ runner.os }}-

      - name: Install JavaScript workspace dependencies
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bun install --frozen-lockfile

      - name: Doctor core readiness
        run: cargo xtask --plain doctor --target core

      - name: Run CI test profile
        run: cargo xtask --plain test unit group full
