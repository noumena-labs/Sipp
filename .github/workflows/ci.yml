name: CI

on:
  pull_request:
    branches:
      - master
  push:
    branches:
      - master

permissions:
  contents: read
  packages: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate PR gate
    runs-on: ubuntu-latest
    env:
      CE_WASM_BUILD_PARALLEL_LEVEL: "2"
    steps:
      - name: Check out repository
        uses: actions/checkout@v6.0.2
        with:
          submodules: false

      - name: Check out private llama.cpp submodule
        env:
          LLAMA_CPP_INTERNAL_DEPLOY_KEY: ${{ secrets.LLAMA_CPP_INTERNAL_DEPLOY_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${LLAMA_CPP_INTERNAL_DEPLOY_KEY:-}" ]; then
            echo "::error::Set LLAMA_CPP_INTERNAL_DEPLOY_KEY to a read-only deploy key for noumena-labs/llama.cpp.internal."
            exit 1
          fi

          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$LLAMA_CPP_INTERNAL_DEPLOY_KEY" > ~/.ssh/llama_cpp_internal
          chmod 600 ~/.ssh/llama_cpp_internal
          ssh-keyscan github.com >> ~/.ssh/known_hosts

          GIT_SSH_COMMAND="ssh -i ~/.ssh/llama_cpp_internal -o IdentitiesOnly=yes" git submodule sync --recursive
          GIT_SSH_COMMAND="ssh -i ~/.ssh/llama_cpp_internal -o IdentitiesOnly=yes" git submodule update --init --recursive

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-emscripten
          components: rust-src

      - name: Set up Node
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 22

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2.2.0
        with:
          bun-version: 1.3.11

      - name: Set up CMake and Ninja
        uses: lukka/get-cmake@latest

      - name: Set up Emscripten
        uses: emscripten-core/setup-emsdk@v16

      - name: Cache Cargo and native build outputs
        uses: actions/cache@v5.0.5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            .build/cargo
            .build/cmake
            .build/c
          key: cargo-ci-${{ runner.os }}-${{ hashFiles('Cargo.lock', '.cargo/config.toml', 'crates/**/Cargo.toml', 'bindings/**/Cargo.toml') }}
          restore-keys: |
            cargo-ci-${{ runner.os }}-

      - name: Cache Bun dependencies
        uses: actions/cache@v5.0.5
        with:
          path: |
            ~/.bun/install/cache
            node_modules
            packages/npm/node_modules
            bindings/node/node_modules
            apps/*/node_modules
          key: bun-ci-${{ runner.os }}-${{ hashFiles('bun.lock', 'bindings/node/bun.lock', 'package.json', 'packages/npm/package.json', 'bindings/node/package.json', 'apps/*/package.json') }}
          restore-keys: |
            bun-ci-${{ runner.os }}-

      - name: Cache xtask toolchains
        uses: actions/cache@v5.0.5
        with:
          path: |
            .build/toolchain
            .build/uv-cache
          key: xtask-toolchain-ci-${{ runner.os }}-${{ hashFiles('crates/xtask/src/toolchains/*.rs') }}
          restore-keys: |
            xtask-toolchain-ci-${{ runner.os }}-

      - name: Cache sample models
        uses: actions/cache@v5.0.5
        with:
          path: .build/models
          key: sample-models-ci-${{ runner.os }}-${{ hashFiles('crates/xtask/src/sample_model.rs') }}
          restore-keys: |
            sample-models-ci-${{ runner.os }}-

      - name: Install dependencies
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bun install --frozen-lockfile

      - name: Doctor core readiness
        run: cargo xtask --plain doctor --target core

      - name: Check test layout
        run: cargo xtask --plain test layout

      - name: Run Rust core tests
        run: cargo xtask --plain test core

      - name: Run Rust public API tests
        run: cargo xtask --plain test rust-api

      - name: Run browser package tests
        run: cargo xtask --plain test browser --no-model
