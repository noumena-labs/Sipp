name: Coverage

on:
  # schedule:
  #   - cron: "0 9 * * *"
  workflow_dispatch:

permissions:
  contents: read
  packages: read

concurrency:
  group: coverage-${{ github.ref }}
  cancel-in-progress: false

jobs:
  coverage:
    name: First-party coverage baseline
    runs-on: ubuntu-latest
    env:
      CE_WASM_BUILD_PARALLEL_LEVEL: "2"
    steps:
      - name: Check out repository
        uses: actions/checkout@v6.0.2
        with:
          submodules: recursive

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-emscripten
          components: rust-src, llvm-tools-preview

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov

      - name: Set up Node
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 22

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2.2.0
        with:
          bun-version: 1.3.11

      - name: Set up CMake and Ninja
        uses: lukka/get-cmake@v4.3.1

      - name: Set up compiler cache
        if: ${{ runner.os != 'Windows' }}
        uses: hendrikmuhs/ccache-action@v1.2.23
        with:
          key: coverage
          max-size: 3G

      - name: Set up Emscripten
        uses: emscripten-core/setup-emsdk@v16
        with:
          actions-cache-folder: emsdk-cache

      - name: Cache Cargo and native build outputs
        uses: actions/cache@v5.0.5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            .build/cargo
            .build/cmake
            .build/c
          key: cargo-coverage-${{ runner.os }}-${{ hashFiles('Cargo.lock', '.cargo/config.toml', 'crates/**/Cargo.toml', 'lib/**/Cargo.toml', 'apps/cli/Cargo.toml', 'xtask/Cargo.toml', 'bindings/**/Cargo.toml') }}
          restore-keys: |
            cargo-coverage-${{ runner.os }}-

      - name: Cache hermetic build toolchains
        uses: actions/cache@v5.0.5
        with:
          path: |
            .build/toolchain
            .build/uv-cache
          key: sipp-toolchain-coverage-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('xtask/src/toolchains/*.rs') }}
          restore-keys: |
            sipp-toolchain-coverage-${{ runner.os }}-${{ runner.arch }}-

      - name: Cache sample models
        uses: actions/cache@v5.0.5
        with:
          path: .build/models
          key: sample-models-coverage-${{ runner.os }}-${{ hashFiles('xtask/src/sample_model.rs') }}
          restore-keys: |
            sample-models-coverage-${{ runner.os }}-

      - name: Install JavaScript workspace dependencies
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bun install --frozen-lockfile

      - name: Run coverage baseline
        run: |
          cargo xtask --plain test unit group full
          cargo xtask --plain test verify --target all

      - name: Publish coverage summary
        run: cat .build/coverage/coverage-summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v6.0.0
        with:
          name: coverage-baseline
          path: .build/coverage
