name: Publish sipp dev packages

on:
  workflow_dispatch:
    inputs:
      package:
        description: Package endpoint to generate or publish
        required: true
        default: all
        type: choice
        options:
          - all
          - web-npm
          - node-npm
          - python
          - rust
      dry_run:
        description: Build and dry-run publish without publishing npm packages
        required: false
        default: true
        type: boolean
  # schedule:
  #   - cron: "0 8 * * *"

permissions:
  contents: read

concurrency:
  group: publish-sipp-dev-${{ github.ref }}
  cancel-in-progress: false

env:
  CUDA_VERSION: "13.0"
  CUDA_PACKAGE_SUFFIX: "13-0"
  CUDA_WINDOWS_INSTALLER_URL: https://developer.download.nvidia.com/compute/cuda/13.0.3/local_installers/cuda_13.0.3_windows.exe
  NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  SIPP_MAX_GLIBC: "2.28"
  SIPP_MAX_WHEEL_MB: "100"

jobs:
  prepare-dev:
    name: Prepare dev version
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    outputs:
      dist_tag: ${{ steps.dev.outputs.dist_tag }}
      python_version: ${{ steps.dev.outputs.python_version }}
      tag: ${{ steps.dev.outputs.tag }}
      version: ${{ steps.dev.outputs.version }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v6.0.2
        with:
          submodules: false

      - name: Resolve aligned version
        id: resolve
        uses: ./.github/actions/resolve-version

      - name: Determine dev version
        id: dev
        shell: bash
        env:
          BASE_VERSION: ${{ steps.resolve.outputs.version }}
        run: |
          set -euo pipefail
          dev_versions="$(node --input-type=module <<'NODE'
          const base = process.env.BASE_VERSION;
          const match = base.match(/^(\d+)\.(\d+)\.(\d+)$/);
          if (!match) {
            throw new Error(`Dev builds must start from a stable x.y.z version, got ${base}`);
          }
          const dev = Number(process.env.GITHUB_RUN_NUMBER) * 100 + Number(process.env.GITHUB_RUN_ATTEMPT);
          // Keep the Cargo/npm dev version parseable by maturin when it reads
          // the Rust crate version. `-devN` is also a PEP 440-compatible dev
          // release after normalization; multi-part `-dev.N.M` is not.
          const npmVersion = `${match[1]}.${match[2]}.${Number(match[3]) + 1}-dev${dev}`;
          const pythonVersion = `${match[1]}.${match[2]}.${Number(match[3]) + 1}.dev${dev}`;
          const tag = `sipp-dev-v${npmVersion}`;
          console.error(`Base version ${base} -> npm/cargo ${npmVersion}, python ${pythonVersion}, tag ${tag}`);
          console.log(`${npmVersion}|${pythonVersion}|${tag}`);
          NODE
          )"
          IFS='|' read -r NPM_VERSION PYTHON_VERSION DEV_TAG <<< "$dev_versions"
          level="error"
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            level="warning"
          fi
          if git ls-remote --exit-code --tags origin "refs/tags/$DEV_TAG" > /dev/null 2>&1; then
            echo "::${level}::Dev tag $DEV_TAG already exists."
            if [ "${{ inputs.dry_run }}" != "true" ]; then
              exit 1
            fi
          fi
          latest_dev_tag="$(git ls-remote --tags --refs origin 'sipp-dev-v*' | awk -F/ '{ print $NF }' | sort -V | tail -1 || true)"
          echo "Latest remote Sipp dev tag: ${latest_dev_tag:-none}"
          echo "version=$NPM_VERSION" >> "$GITHUB_OUTPUT"
          echo "python_version=$PYTHON_VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$DEV_TAG" >> "$GITHUB_OUTPUT"
          echo "dist_tag=dev" >> "$GITHUB_OUTPUT"

  gate:
    name: Dev publish gate
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    needs: prepare-dev
    env:
      CE_WASM_BUILD_PARALLEL_LEVEL: "2"
    steps:
      - name: Check out repository
        uses: actions/checkout@v6.0.2
        with:
          submodules: recursive

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-emscripten
          components: rust-src

      - name: Set up Node
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 22
          registry-url: https://npm.pkg.github.com
          scope: "@noumena-labs"

      - name: Set up CMake and Ninja
        uses: lukka/get-cmake@v4.3.1

      - name: Set up compiler cache
        if: ${{ runner.os != 'Windows' }}
        uses: hendrikmuhs/ccache-action@v1.2.23
        with:
          key: devpublish-gate
          max-size: 3G

      - name: Cache Cargo and native build outputs
        uses: actions/cache@v5.0.5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            .build/cargo
            .build/cmake
            .build/c
          key: cargo-devpublish-gate-${{ runner.os }}-${{ hashFiles('Cargo.lock', '.cargo/config.toml', 'crates/**/Cargo.toml', 'lib/**/Cargo.toml', 'apps/cli/Cargo.toml', 'xtask/Cargo.toml', 'bindings/**/Cargo.toml') }}
          restore-keys: |
            cargo-devpublish-gate-${{ runner.os }}-

      - name: Cache hermetic build toolchains
        uses: actions/cache@v5.0.5
        with:
          path: |
            .build/toolchain
            .build/uv-cache
          key: sipp-toolchain-devpublish-gate-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('xtask/src/toolchains/*.rs') }}
          restore-keys: |
            sipp-toolchain-devpublish-gate-${{ runner.os }}-${{ runner.arch }}-

      - name: Apply dev package versions
        uses: ./.github/actions/apply-dev-versions
        with:
          npm-version: ${{ needs.prepare-dev.outputs.version }}
          python-version: ${{ needs.prepare-dev.outputs.python_version }}

      - name: Run fast dev publish gate
        run: |
          cargo xtask --plain test unit --no-coverage suite xtask
          cargo xtask --plain test unit --no-coverage suite rust-crates
          cargo xtask --plain test unit --no-coverage suite rust-bindings

      - name: Upload test logs on failure
        if: ${{ failure() }}
        uses: actions/upload-artifact@v6.0.0
        with:
          name: dev-gate-test-logs
          path: |
            .build/logs
            .build/test/run-report.json
          if-no-files-found: ignore
          retention-days: 7

  web-npm:
    name: Build web npm package
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    needs:
      - gate
      - prepare-dev
    if: ${{ inputs.package == 'all' || inputs.package == 'web-npm' }}
    permissions:
      contents: read
      packages: write
    env:
      CE_WASM_BUILD_PARALLEL_LEVEL: "2"
    steps:
      - name: Check out repository
        uses: actions/checkout@v6.0.2
        with:
          submodules: recursive

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-emscripten
          components: rust-src

      - name: Set up Node
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 22
          registry-url: https://npm.pkg.github.com
          scope: "@noumena-labs"

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2.2.0
        with:
          bun-version: 1.3.11

      - name: Set up CMake and Ninja
        uses: lukka/get-cmake@v4.3.1

      - name: Set up compiler cache
        if: ${{ runner.os != 'Windows' }}
        uses: hendrikmuhs/ccache-action@v1.2.23
        with:
          key: devpublish-web
          max-size: 3G

      - name: Cache Cargo and native build outputs
        uses: actions/cache@v5.0.5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            .build/cargo
            .build/cmake
            .build/c
          key: cargo-devpublish-web-${{ runner.os }}-${{ hashFiles('Cargo.lock', '.cargo/config.toml', 'crates/**/Cargo.toml', 'lib/**/Cargo.toml', 'apps/cli/Cargo.toml', 'xtask/Cargo.toml', 'bindings/**/Cargo.toml') }}
          restore-keys: |
            cargo-devpublish-web-${{ runner.os }}-

      - name: Cache hermetic build toolchains
        uses: actions/cache@v5.0.5
        with:
          path: |
            .build/toolchain
            .build/uv-cache
          key: sipp-toolchain-devpublish-web-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('xtask/src/toolchains/*.rs') }}
          restore-keys: |
            sipp-toolchain-devpublish-web-${{ runner.os }}-${{ runner.arch }}-

      - name: Install JavaScript workspace dependencies
        run: bun install --frozen-lockfile

      - name: Apply dev package versions
        uses: ./.github/actions/apply-dev-versions
        with:
          npm-version: ${{ needs.prepare-dev.outputs.version }}
          python-version: ${{ needs.prepare-dev.outputs.python_version }}

      - name: Configure GitHub Packages authentication
        shell: bash
        env:
          PACKAGE_TOKEN: ${{ secrets.PACKAGE_PUBLISH_TOKEN }}
          DRY_RUN: ${{ inputs.dry_run }}
        run: |
          set -euo pipefail
          if [ -z "${PACKAGE_TOKEN:-}" ]; then
            if [ "$DRY_RUN" = "true" ]; then
              echo "::warning::PACKAGE_PUBLISH_TOKEN is not set; continuing because this is a dry run."
              exit 0
            fi
            echo "::error::Set PACKAGE_PUBLISH_TOKEN to a token with write:packages scope."
            exit 1
          fi
          printf "@noumena-labs:registry=https://npm.pkg.github.com\n//npm.pkg.github.com/:_authToken=%s\n" "$PACKAGE_TOKEN" > "$RUNNER_TEMP/npmrc"
          echo "NPM_CONFIG_USERCONFIG=$RUNNER_TEMP/npmrc" >> "$GITHUB_ENV"

      - name: Build and test staged web package
        run: cargo xtask --plain test unit suite browser

      - name: Require staged web WASM artifacts
        shell: bash
        run: |
          set -euo pipefail
          for artifact in \
            .build/artifacts/npm/sipp/dist/wasm/sipp-wasm.js \
            .build/artifacts/npm/sipp/dist/wasm/sipp-wasm.wasm \
            .build/artifacts/npm/sipp/dist/wasm/sipp-wasm-pthread.js \
            .build/artifacts/npm/sipp/dist/wasm/sipp-wasm-pthread.wasm; do
            if [ ! -f "$artifact" ]; then
              echo "::error::Missing staged web WASM artifact: $artifact"
              exit 1
            fi
          done

      - name: Run web package import smoke
        run: |
          node --input-type=module <<'NODE'
          const pkg = await import('./.build/artifacts/npm/sipp/dist/esm/index.js');
          if (typeof pkg.SippClient !== 'function') {
            throw new Error('SippClient export is missing from the staged package.');
          }
          NODE

      - name: Upload web npm artifact
        uses: actions/upload-artifact@v6.0.0
        with:
          name: sipp-web-npm-dev
          path: .build/artifacts/npm/sipp
          retention-days: 7

      - name: Validate web GitHub Packages publish
        env:
          DIST_TAG: ${{ needs.prepare-dev.outputs.dist_tag }}
        working-directory: .build/artifacts/npm/sipp
        run: npm publish --dry-run --registry https://npm.pkg.github.com --tag "$DIST_TAG"

      - name: Publish web package to GitHub Packages
        if: ${{ inputs.dry_run == false }}
        env:
          DIST_TAG: ${{ needs.prepare-dev.outputs.dist_tag }}
        working-directory: .build/artifacts/npm/sipp
        run: npm publish --registry https://npm.pkg.github.com --tag "$DIST_TAG"

  native:
    name: Build native packages
    needs:
      - gate
      - prepare-dev
    if: ${{ inputs.package == 'all' || inputs.package == 'node-npm' || inputs.package == 'python' || inputs.package == 'rust' }}
    permissions:
      contents: read
      packages: read
    uses: ./.github/workflows/build-native.yml
    with:
      package: ${{ inputs.package }}
      node-registry: https://npm.pkg.github.com
      node-scope: "@noumena-labs"
      apply-dev-versions: true
      npm-version: ${{ needs.prepare-dev.outputs.version }}
      python-version: ${{ needs.prepare-dev.outputs.python_version }}
      artifact-suffix: "-dev"
      enforce: false
      cuda-architectures: "86-real"
      release-lto: ${{ 'false' }}
      release-codegen-units: "16"
      artifact-retention-days: 7

  node-npm:
    name: Assemble Node npm packages
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    needs:
      - native
      - prepare-dev
    if: ${{ inputs.package == 'all' || inputs.package == 'node-npm' }}
    permissions:
      contents: read
      packages: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v6.0.2
        with:
          submodules: false

      - name: Set up Node
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 22
          registry-url: https://npm.pkg.github.com
          scope: "@noumena-labs"

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2.2.0
        with:
          bun-version: 1.3.11

      - name: Install JavaScript workspace dependencies
        run: bun install --frozen-lockfile

      - name: Apply dev package versions
        uses: ./.github/actions/apply-dev-versions
        with:
          npm-version: ${{ needs.prepare-dev.outputs.version }}
          python-version: ${{ needs.prepare-dev.outputs.python_version }}

      - name: Download Node native artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: sipp-node-native-dev-*
          path: .build/artifacts/node
          merge-multiple: true

      - name: Stage Node server packages
        working-directory: lib/node
        run: bun run build:stage

      - name: Install staged packages and require router
        shell: bash
        run: |
          set -euo pipefail
          wrapper_dir=.build/artifacts/npm/sipp-server
          platform_dir=.build/artifacts/npm/sipp-server-linux-x64-gnu
          if [ ! -d "$platform_dir" ]; then
            echo "::error::Staged linux-x64-gnu platform package is missing."
            exit 1
          fi
          package_name="$(node -p "require('./$wrapper_dir/package.json').name")"
          smoke_dir="$RUNNER_TEMP/sipp-npm-smoke"
          rm -rf "$smoke_dir"
          mkdir -p "$smoke_dir"
          wrapper_tgz="$(npm pack "./$wrapper_dir" --pack-destination "$smoke_dir" --json | jq -r '.[0].filename')"
          platform_tgz="$(npm pack "./$platform_dir" --pack-destination "$smoke_dir" --json | jq -r '.[0].filename')"
          cd "$smoke_dir"
          npm init -y > /dev/null
          npm install --no-audit --no-fund --omit=optional "./$platform_tgz" "./$wrapper_tgz"
          SMOKE_PACKAGE_NAME="$package_name" SIPP_NODE_BACKEND=cpu node -e '
            const wrapper = require(process.env.SMOKE_PACKAGE_NAME);
            const backend = wrapper.getActiveBackend();
            if (backend !== "cpu") {
              throw new Error(`expected cpu backend from staged packages, got ${backend}`);
            }
            console.log(`Loaded ${process.env.SMOKE_PACKAGE_NAME} from staged tarballs with backend=${backend}`);
          '

      - name: Configure GitHub Packages authentication
        shell: bash
        env:
          PACKAGE_TOKEN: ${{ secrets.PACKAGE_PUBLISH_TOKEN }}
          DRY_RUN: ${{ inputs.dry_run }}
        run: |
          set -euo pipefail
          if [ -z "${PACKAGE_TOKEN:-}" ]; then
            if [ "$DRY_RUN" = "true" ]; then
              echo "::warning::PACKAGE_PUBLISH_TOKEN is not set; continuing because this is a dry run."
              exit 0
            fi
            echo "::error::Set PACKAGE_PUBLISH_TOKEN to a token with write:packages scope."
            exit 1
          fi
          printf "@noumena-labs:registry=https://npm.pkg.github.com\n//npm.pkg.github.com/:_authToken=%s\n" "$PACKAGE_TOKEN" > "$RUNNER_TEMP/npmrc"
          echo "NPM_CONFIG_USERCONFIG=$RUNNER_TEMP/npmrc" >> "$GITHUB_ENV"

      - name: Upload Node npm artifacts
        uses: actions/upload-artifact@v6.0.0
        with:
          name: sipp-server-npm-dev
          path: |
            .build/artifacts/npm/sipp-server
            .build/artifacts/npm/sipp-server-*
          retention-days: 7

      - name: Validate Node GitHub Packages publish
        shell: bash
        env:
          DIST_TAG: ${{ needs.prepare-dev.outputs.dist_tag }}
        run: |
          set -euo pipefail
          for package_dir in .build/artifacts/npm/sipp-server-* .build/artifacts/npm/sipp-server; do
            [ -d "$package_dir" ] || continue
            npm publish "$package_dir" --dry-run --registry https://npm.pkg.github.com --tag "$DIST_TAG"
          done

      - name: Publish Node packages to GitHub Packages
        if: ${{ inputs.dry_run == false }}
        shell: bash
        env:
          DIST_TAG: ${{ needs.prepare-dev.outputs.dist_tag }}
        run: |
          set -euo pipefail
          for package_dir in .build/artifacts/npm/sipp-server-* .build/artifacts/npm/sipp-server; do
            [ -d "$package_dir" ] || continue
            npm publish "$package_dir" --registry https://npm.pkg.github.com --tag "$DIST_TAG"
          done

  rust-source:
    name: Package Rust source
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    needs:
      - native
      - prepare-dev
    if: ${{ inputs.package == 'all' || inputs.package == 'rust' }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v6.0.2
        with:
          submodules: recursive

      - name: Apply dev package versions
        uses: ./.github/actions/apply-dev-versions
        with:
          npm-version: ${{ needs.prepare-dev.outputs.version }}
          python-version: ${{ needs.prepare-dev.outputs.python_version }}

      - name: Package Rust source artifact
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .build/artifacts/rust
          tar -czf .build/artifacts/rust/sipp-rust-source-dev-${{ github.run_number }}.${{ github.run_attempt }}.tar.gz \
            Cargo.toml \
            Cargo.lock \
            README.md \
            LICENSE \
            crates/sipp \
            crates/sys \
            lib/gateway \
            lib/binding-dto

      - name: Upload Rust crate artifact
        uses: actions/upload-artifact@v6.0.0
        with:
          name: sipp-rust-source-dev
          path: .build/artifacts/rust/*.tar.gz
          retention-days: 7

  tag-dev:
    name: Tag dev build
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    needs:
      - prepare-dev
      - web-npm
      - native
      - node-npm
      - rust-source
    if: ${{ inputs.dry_run == false && inputs.package == 'all' }}
    permissions:
      contents: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v6.0.2
        with:
          submodules: false

      - name: Tag dev version
        shell: bash
        env:
          DEV_TAG: ${{ needs.prepare-dev.outputs.tag }}
        run: |
          set -euo pipefail
          if git ls-remote --exit-code --tags origin "refs/tags/$DEV_TAG" > /dev/null 2>&1; then
            echo "::error::Dev tag $DEV_TAG already exists."
            exit 1
          fi
          git tag "$DEV_TAG"
          git push origin "$DEV_TAG"
          echo "Tagged $GITHUB_SHA as $DEV_TAG" >> "$GITHUB_STEP_SUMMARY"
