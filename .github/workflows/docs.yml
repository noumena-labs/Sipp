name: Docs

on:
  pull_request:
    branches:
      - master
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: docs-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  MDBOOK_VERSION: 0.5.3

jobs:
  build:
    name: Build mdBook
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6.0.2
        with:
          submodules: false

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo installs
        uses: actions/cache@v5.0.5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cargo/bin/mdbook
          key: mdbook-${{ runner.os }}-${{ env.MDBOOK_VERSION }}

      - name: Install mdBook
        run: |
          if ! command -v mdbook >/dev/null 2>&1 || [ "$(mdbook --version | awk '{print $2}')" != "$MDBOOK_VERSION" ]; then
            cargo install mdbook --version "$MDBOOK_VERSION" --locked --force
          fi

      - name: Build documentation
        run: mdbook build

      - name: Upload Pages artifact
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/master' }}
        uses: actions/upload-pages-artifact@v4
        with:
          path: book

  deploy:
    name: Deploy GitHub Pages
    needs: build
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/master' }}
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
