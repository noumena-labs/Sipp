name: Build native packages

# Reusable native build matrix shared by release.yml and publish-dev.yml.
# Builds the Node addon, Python wheels, and Rust core across the four supported
# OS/arch targets, verifies backends, runs smoke tests, and uploads artifacts.
# Publishing is intentionally left to the calling workflow.
on:
  workflow_call:
    inputs:
      package:
        description: Package endpoint to build (all, node-npm, python, or rust)
        required: true
        type: string
      node-registry:
        description: npm registry the staged packages target
        required: false
        default: https://registry.npmjs.org
        type: string
      node-scope:
        description: npm scope to configure for setup-node
        required: false
        default: ""
        type: string
      apply-dev-versions:
        description: Rewrite manifests with dev channel versions before building
        required: false
        default: false
        type: boolean
      npm-version:
        description: Dev npm/cargo version (only used when apply-dev-versions is true)
        required: false
        default: ""
        type: string
      python-version:
        description: Dev PEP 440 version (only used when apply-dev-versions is true)
        required: false
        default: ""
        type: string
      artifact-suffix:
        description: Suffix appended to uploaded artifact names (for example -dev)
        required: false
        default: ""
        type: string
      enforce:
        description: Fail the build on glibc/wheel-size budget violations (release) or warn only (dev)
        required: false
        default: true
        type: boolean
      cuda-architectures:
        description: Optional semicolon-separated CMAKE_CUDA_ARCHITECTURES override
        required: false
        default: ""
        type: string
      release-lto:
        description: Cargo release-profile LTO setting for native package builds
        required: false
        default: fat
        type: string
      release-codegen-units:
        description: Cargo release-profile codegen unit count for native package builds
        required: false
        default: "1"
        type: string
      artifact-retention-days:
        description: Retention period for uploaded native artifacts
        required: false
        default: 30
        type: number

env:
  CUDA_VERSION: "13.3"
  CUDA_PACKAGE_SUFFIX: "13-3"
  CUDA_WINDOWS_INSTALLER_URL: https://developer.download.nvidia.com/compute/cuda/13.3.0/local_installers/cuda_13.3.0_windows.exe
  NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  SIPP_MAX_GLIBC: "2.35"
  SIPP_MAX_WHEEL_MB: "100"

jobs:
  native:
    name: Build native ${{ matrix.id }} packages
    if: ${{ inputs.package != 'rust' }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 300
    env:
      SIPP_CUDA_ARCHITECTURES: ${{ inputs.cuda-architectures }}
      SIPP_PYTHON_GPU_AUDITWHEEL: ${{ inputs.enforce == false && 'warn' || '' }}
      CARGO_PROFILE_RELEASE_LTO: ${{ inputs.release-lto }}
      CARGO_PROFILE_RELEASE_CODEGEN_UNITS: ${{ inputs.release-codegen-units }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - id: linux-x64
            os: ubuntu-24.04
            backends: cpu,vulkan,cuda
            cuda: true
          - id: windows-x64
            os: windows-2022
            backends: cpu,vulkan,cuda
            cuda: true
          - id: macos-x64
            os: macos-15-intel
            backends: cpu,metal
            cuda: false
          - id: macos-arm64
            os: macos-14
            backends: cpu,metal
            cuda: false
    steps:
      - name: Check out repository
        uses: actions/checkout@v6.0.2
        with:
          submodules: recursive

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rust-src

      - name: Set up Node
        if: ${{ inputs.apply-dev-versions || inputs.package == 'all' || inputs.package == 'node-npm' }}
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 22
          registry-url: ${{ inputs.node-registry }}
          scope: ${{ inputs.node-scope }}

      - name: Set up Bun
        if: ${{ inputs.package == 'all' || inputs.package == 'node-npm' }}
        uses: oven-sh/setup-bun@v2.2.0
        with:
          bun-version: 1.3.11

      - name: Set up CMake and Ninja
        uses: lukka/get-cmake@v4.3.1

      - name: Set up compiler cache
        # ggml auto-detects ccache via GGML_CCACHE=ON and wraps every compile.
        # Skipped on Windows because ccache-over-MSVC is unreliable; that leg
        # still gets incremental reuse from the cached .build/cmake tree below.
        if: ${{ runner.os != 'Windows' }}
        uses: hendrikmuhs/ccache-action@v1.2.23
        with:
          key: build-native-${{ matrix.id }}
          max-size: 3G

      - name: Cache Cargo and native build outputs
        uses: actions/cache@v5.0.5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            .build/cargo
            .build/cmake
            .build/c
          key: cargo-build-native-${{ runner.os }}-${{ matrix.id }}-${{ hashFiles('Cargo.lock', '.cargo/config.toml', 'crates/**/Cargo.toml', 'lib/**/Cargo.toml', 'apps/cli/Cargo.toml', 'xtask/Cargo.toml', 'bindings/**/Cargo.toml') }}
          restore-keys: |
            cargo-build-native-${{ runner.os }}-${{ matrix.id }}-

      - name: Cache hermetic build toolchains
        uses: actions/cache@v5.0.5
        with:
          path: |
            .build/toolchain
            .build/uv-cache
          key: sipp-toolchain-build-native-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('xtask/src/toolchains/*.rs') }}
          restore-keys: |
            sipp-toolchain-build-native-${{ runner.os }}-${{ runner.arch }}-

      - name: Install Linux CUDA 13.3 and Vulkan development libraries
        if: ${{ runner.os == 'Linux' && matrix.cuda && (inputs.package == 'all' || inputs.package == 'node-npm' || inputs.package == 'python') }}
        shell: bash
        run: |
          set -euo pipefail
          curl -fsSLO https://developer.download.nvidia.com/compute/cuda/repos/ubuntu2404/x86_64/cuda-keyring_1.1-1_all.deb
          sudo dpkg -i cuda-keyring_1.1-1_all.deb
          sudo apt-get update
          sudo apt-get install -y "cuda-compiler-${CUDA_PACKAGE_SUFFIX}" "cuda-libraries-dev-${CUDA_PACKAGE_SUFFIX}" libvulkan-dev
          {
            echo "CUDA_HOME=/usr/local/cuda-${CUDA_VERSION}"
            echo "CUDA_PATH=/usr/local/cuda-${CUDA_VERSION}"
            echo "LIBRARY_PATH=/usr/local/cuda-${CUDA_VERSION}/lib64:/usr/local/cuda-${CUDA_VERSION}/lib64/stubs:${LIBRARY_PATH:-}"
            echo "LD_LIBRARY_PATH=/usr/local/cuda-${CUDA_VERSION}/lib64:/usr/local/cuda-${CUDA_VERSION}/lib64/stubs:${LD_LIBRARY_PATH:-}"
          } >> "$GITHUB_ENV"
          echo "/usr/local/cuda-${CUDA_VERSION}/bin" >> "$GITHUB_PATH"
          "/usr/local/cuda-${CUDA_VERSION}/bin/nvcc" --version

      - name: Install Windows CUDA 13.3 compiler and development libraries
        if: ${{ runner.os == 'Windows' && matrix.cuda && (inputs.package == 'all' || inputs.package == 'node-npm' || inputs.package == 'python') }}
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $installer = Join-Path $env:RUNNER_TEMP "cuda_13.3.0_windows.exe"
          Invoke-WebRequest -Uri $env:CUDA_WINDOWS_INSTALLER_URL -OutFile $installer
          $packages = @(
            "crt_13.3",
            "cublas_13.3",
            "cublas_dev_13.3",
            "cudart_13.3",
            "nvcc_13.3",
            "nvfatbin_13.3",
            "nvjitlink_13.3",
            "nvml_dev_13.3",
            "nvptxcompiler_13.3",
            "nvrtc_13.3",
            "nvrtc_dev_13.3",
            "nvtx_13.3",
            "nvvm_13.3",
            "thrust_13.3",
            "visual_studio_integration_13.3"
          )
          $process = Start-Process -FilePath $installer -ArgumentList (@("-s") + $packages) -Wait -PassThru
          if ($process.ExitCode -ne 0) {
            throw "CUDA installer failed with exit code $($process.ExitCode)"
          }
          $cudaPath = "C:\Program Files\NVIDIA GPU Computing Toolkit\CUDA\v$env:CUDA_VERSION"
          "CUDA_HOME=$cudaPath" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "CUDA_PATH=$cudaPath" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "$cudaPath\bin" | Out-File -FilePath $env:GITHUB_PATH -Append -Encoding utf8
          & "$cudaPath\bin\nvcc.exe" --version

      - name: Install JavaScript workspace dependencies
        if: ${{ inputs.package == 'all' || inputs.package == 'node-npm' }}
        run: bun install --frozen-lockfile

      - name: Apply dev package versions
        if: ${{ inputs.apply-dev-versions }}
        uses: ./.github/actions/apply-dev-versions
        with:
          npm-version: ${{ inputs.npm-version }}
          python-version: ${{ inputs.python-version }}

      - name: Print backend plan
        shell: bash
        run: |
          echo "OS package set: ${{ matrix.id }}"
          echo "Native backends: ${{ matrix.backends }}"

      - name: Build Node native artifacts
        if: ${{ inputs.package == 'all' || inputs.package == 'node-npm' }}
        env:
          SIPP_REQUIRE_ALL_BACKENDS: "1"
        run: cargo xtask --plain build node --backend all

      - name: Require Node backend artifacts
        if: ${{ inputs.package == 'all' || inputs.package == 'node-npm' }}
        shell: bash
        env:
          BACKENDS: ${{ matrix.backends }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          missing=0
          IFS=',' read -ra backends <<< "$BACKENDS"
          for backend in "${backends[@]}"; do
            artifacts=(.build/artifacts/node/sipp_node_"$backend".*.node)
            if [ "${#artifacts[@]}" -eq 0 ]; then
              echo "::error::Native build completed without a $backend Node artifact. xtask treats non-CPU backends as best-effort, so the failure was only a warning there."
              missing=1
            else
              printf 'Found %s Node artifact: %s\n' "$backend" "${artifacts[@]}"
            fi
          done
          exit "$missing"

      - name: Run Node binding smoke tests
        if: ${{ inputs.package == 'all' || inputs.package == 'node-npm' }}
        working-directory: lib/node
        env:
          SIPP_NODE_BACKEND: cpu
          SIPP_NODE_TEST_BACKEND: cpu
        run: node --test tests/router.test.mjs

      - name: Upload Node native artifacts
        if: ${{ inputs.package == 'all' || inputs.package == 'node-npm' }}
        uses: actions/upload-artifact@v6.0.0
        with:
          name: sipp-node-native${{ inputs.artifact-suffix }}-${{ matrix.id }}
          path: .build/artifacts/node/sipp_node_*.node
          retention-days: ${{ inputs.artifact-retention-days }}

      - name: Build Python wheels
        if: ${{ inputs.package == 'all' || inputs.package == 'python' }}
        env:
          SIPP_REQUIRE_ALL_BACKENDS: "1"
        run: cargo xtask --plain build python --backend all

      - name: Require Python backend wheels
        if: ${{ inputs.package == 'all' || inputs.package == 'python' }}
        shell: bash
        env:
          BACKENDS: ${{ matrix.backends }}
        run: |
          set -euo pipefail
          uv_exe=".build/toolchain/uv/uv"
          if [ "${{ runner.os }}" = "Windows" ]; then
            uv_exe=".build/toolchain/uv/uv.exe"
          fi
          "$uv_exe" run python - <<'PY'
          import glob
          import os
          import sys
          import zipfile

          backends = [backend.strip() for backend in os.environ["BACKENDS"].split(",") if backend.strip()]
          wheels = glob.glob(".build/artifacts/python/*.whl")
          expected = {
              "cpu": ("sipp", "sipp/_native"),
              "cuda": ("sipp_backend_cuda", "sipp_backend_cuda/_native"),
              "metal": ("sipp_backend_metal", "sipp_backend_metal/_native"),
              "vulkan": ("sipp_backend_vulkan", "sipp_backend_vulkan/_native"),
          }
          missing = []
          for backend in backends:
              distribution, module_prefix = expected[backend]
              matches = [wheel for wheel in wheels if os.path.basename(wheel).startswith(f"{distribution}-")]
              if len(matches) != 1:
                  missing.append(f"{backend} distribution {distribution}")
                  continue
              with zipfile.ZipFile(matches[0]) as wheel:
                  names = wheel.namelist()
              if not any(name.startswith(module_prefix) for name in names):
                  missing.append(f"{backend} native module {module_prefix}")
          if missing:
              raise SystemExit(
                  "Python wheel set is missing required backend artifacts: "
                  + ", ".join(missing)
              )
          print(f"Found all required Python backend wheels: {', '.join(backends)}", file=sys.stderr)
          PY

      - name: Validate Python wheel metadata
        if: ${{ inputs.package == 'all' || inputs.package == 'python' }}
        shell: bash
        run: |
          set -euo pipefail
          uv_exe=".build/toolchain/uv/uv"
          if [ "${{ runner.os }}" = "Windows" ]; then
            uv_exe=".build/toolchain/uv/uv.exe"
          fi
          "$uv_exe" tool run twine check .build/artifacts/python/*.whl

      - name: Check PyPI wheel size budget
        if: ${{ inputs.package == 'all' || inputs.package == 'python' }}
        shell: bash
        env:
          ENFORCE: ${{ inputs.enforce }}
        run: |
          set -euo pipefail
          for wheel in .build/artifacts/python/*.whl; do
            size_mb=$(( $(wc -c < "$wheel") / 1024 / 1024 ))
            if [ "$size_mb" -ge "$SIPP_MAX_WHEEL_MB" ]; then
              if [ "$ENFORCE" = "true" ]; then
                echo "::error::$(basename "$wheel") is ${size_mb} MiB, at or above the ${SIPP_MAX_WHEEL_MB} MiB PyPI default file limit. Request a PyPI file-size increase, trim CUDA architectures, or split large runtime libraries before releasing."
                exit 1
              fi
              echo "::warning::$(basename "$wheel") is ${size_mb} MiB, at or above the ${SIPP_MAX_WHEEL_MB} MiB PyPI default file limit. The release workflow will block on this; request a PyPI file-size increase, trim CUDA architectures, or split large runtime libraries."
            else
              echo "$(basename "$wheel") is ${size_mb} MiB (limit ${SIPP_MAX_WHEEL_MB} MiB)"
            fi
          done

      - name: Run wheel install and import smoke
        if: ${{ inputs.package == 'all' || inputs.package == 'python' }}
        shell: bash
        run: |
          set -euo pipefail
          uv_exe=".build/toolchain/uv/uv"
          if [ "${{ runner.os }}" = "Windows" ]; then
            uv_exe=".build/toolchain/uv/uv.exe"
          fi
          run_cmd=("$uv_exe" run --no-project --python 3.12)
          for wheel in .build/artifacts/python/*.whl; do
            run_cmd+=(--with "$wheel")
          done
          SIPP_PYTHON_BACKEND=cpu "${run_cmd[@]}" \
            python -c "import sipp; backend = sipp.get_active_backend(); assert backend == 'cpu', backend; print(f'Imported sipp wheel set with backend={backend}')"

      - name: Upload Python wheel artifact
        if: ${{ inputs.package == 'all' || inputs.package == 'python' }}
        uses: actions/upload-artifact@v6.0.0
        with:
          name: sipp-python-wheels${{ inputs.artifact-suffix }}-${{ matrix.id }}
          path: .build/artifacts/python/*.whl
          retention-days: ${{ inputs.artifact-retention-days }}

      - name: Audit Linux native artifacts
        if: ${{ runner.os == 'Linux' && (inputs.package == 'all' || inputs.package == 'node-npm' || inputs.package == 'python') }}
        uses: ./.github/actions/audit-linux-native-artifacts
        with:
          max-glibc: ${{ env.SIPP_MAX_GLIBC }}
          enforce: ${{ inputs.enforce }}

      - name: Build Rust core on host
        if: ${{ inputs.package == 'all' && matrix.id == 'linux-x64' }}
        run: cargo xtask --plain build core

      - name: Upload native build logs on failure
        if: ${{ failure() }}
        uses: actions/upload-artifact@v6.0.0
        with:
          name: native-build-logs${{ inputs.artifact-suffix }}-${{ matrix.id }}
          path: .build/logs
          if-no-files-found: ignore
          retention-days: ${{ inputs.artifact-retention-days }}

  rust-core:
    name: Build Rust core
    if: ${{ inputs.package == 'rust' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    env:
      CARGO_PROFILE_RELEASE_LTO: ${{ inputs.release-lto }}
      CARGO_PROFILE_RELEASE_CODEGEN_UNITS: ${{ inputs.release-codegen-units }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v6.0.2
        with:
          submodules: recursive

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rust-src

      - name: Set up CMake and Ninja
        uses: lukka/get-cmake@v4.3.1

      - name: Set up compiler cache
        uses: hendrikmuhs/ccache-action@v1.2.23
        with:
          key: build-native-rust-core
          max-size: 3G

      - name: Cache Cargo and native build outputs
        uses: actions/cache@v5.0.5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            .build/cargo
            .build/cmake
            .build/c
          key: cargo-build-native-rust-core-${{ runner.os }}-${{ hashFiles('Cargo.lock', '.cargo/config.toml', 'crates/**/Cargo.toml', 'lib/**/Cargo.toml', 'apps/cli/Cargo.toml', 'xtask/Cargo.toml', 'bindings/**/Cargo.toml') }}
          restore-keys: |
            cargo-build-native-rust-core-${{ runner.os }}-

      - name: Cache hermetic build toolchains
        uses: actions/cache@v5.0.5
        with:
          path: |
            .build/toolchain
          key: sipp-toolchain-build-native-rust-core-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('xtask/src/toolchains/*.rs') }}
          restore-keys: |
            sipp-toolchain-build-native-rust-core-${{ runner.os }}-${{ runner.arch }}-

      - name: Build Rust core on host
        run: cargo xtask --plain build core

      - name: Upload native build logs on failure
        if: ${{ failure() }}
        uses: actions/upload-artifact@v6.0.0
        with:
          name: native-build-logs${{ inputs.artifact-suffix }}-rust-core
          path: .build/logs
          if-no-files-found: ignore
          retention-days: ${{ inputs.artifact-retention-days }}
