name: Publish cogentlm dev

on:
  schedule:
    # GitHub schedules use UTC. These cover 2am America/Toronto in DST and standard time.
    - cron: "0 6 * * *"
    - cron: "0 7 * * *"
  workflow_dispatch:

permissions:
  contents: write
  packages: write

concurrency:
  group: publish-cogentlm-dev
  cancel-in-progress: false

jobs:
  publish-dev:
    name: Publish dev package
    runs-on: ubuntu-latest
    env:
      CE_WASM_BUILD_PARALLEL_LEVEL: "2"
    steps:
      - name: Validate publish ref
        run: |
          set -euo pipefail
          if [ "$GITHUB_EVENT_NAME" = "schedule" ] && [ "${GITHUB_REF}" != "refs/heads/master" ]; then
            echo "Scheduled dev publish workflow must run from master."
            exit 1
          fi

          if [ "$GITHUB_EVENT_NAME" = "workflow_dispatch" ] && [ "${GITHUB_REF_TYPE}" != "branch" ]; then
            echo "::error::Dev publish workflow must run from a branch ref."
            exit 1
          fi

          if [ "${GITHUB_REF}" != "refs/heads/master" ]; then
            echo "Publishing branch dev package from ${GITHUB_REF_NAME}."
          fi

      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: false
          token: ${{ secrets.RELEASE_GITHUB_TOKEN != '' && secrets.RELEASE_GITHUB_TOKEN || github.token }}

      - name: Determine dev publish eligibility
        id: dev
        run: |
          set -euo pipefail
          if [ "$GITHUB_EVENT_NAME" = "schedule" ] && [ "$(TZ=America/Toronto date +%H)" != "02" ]; then
            echo "Scheduled run is outside 2am America/Toronto; skipping dev publish."
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          BASE_VERSION="$(node <<'NODE'
          const packageJson = require('./packages/cogentlm/package.json');
          const match = packageJson.version.match(/^(\d+)\.(\d+)\.(\d+)/);
          if (!match) {
            throw new Error(`Unsupported version format: ${packageJson.version}`);
          }

          const major = Number(match[1]);
          const minor = Number(match[2]);
          const patch = Number(match[3]) + 1;
          console.log(`${major}.${minor}.${patch}`);
          NODE
          )"

          IS_MASTER="false"
          if [ "${GITHUB_REF}" = "refs/heads/master" ]; then
            IS_MASTER="true"
          fi

          if [ "$IS_MASTER" = "true" ]; then
            LAST_TAG="$(git tag --list 'cogentlm-dev-*' --sort=-creatordate | head -n 1 || true)"
            COMMIT_RANGE=""
            if [ -n "$LAST_TAG" ]; then
              COMMIT_RANGE="$LAST_TAG..HEAD"
            fi

            NON_BOT_COMMITS="$(git log --format='%H%x09%an%x09%ae' $COMMIT_RANGE | awk -F '\t' '$2 !~ /\\[bot\\]$/ && $3 !~ /\\[bot\\]@users\\.noreply\\.github\\.com$/ && $3 !~ /(^|[+._-])bot@users\\.noreply\\.github\\.com$/ { print $1 }')"
            if [ -z "$NON_BOT_COMMITS" ]; then
              echo "No non-bot commits since ${LAST_TAG:-repository start}; skipping dev publish."
              echo "should_publish=false" >> "$GITHUB_OUTPUT"
              exit 0
            fi

            DEV_VERSION="${BASE_VERSION}-dev.${GITHUB_RUN_NUMBER}"
            DEV_TAG="cogentlm-dev-v${DEV_VERSION}"
            DIST_TAG="dev"
          else
            LAST_TAG=""
            DEV_TAG=""
            BRANCH_SLUG="$(node <<'NODE'
          const crypto = require('node:crypto');

          const branchName = process.env.GITHUB_REF_NAME;
          const rawSlug = branchName
            .toLowerCase()
            .replace(/[^a-z0-9]+/g, '-')
            .replace(/^-+|-+$/g, '')
            .replace(/-{2,}/g, '-');

          if (!rawSlug) {
            throw new Error(`Could not create a safe npm dist-tag slug from branch: ${branchName}`);
          }

          const branchHash = crypto.createHash('sha1').update(branchName).digest('hex').slice(0, 8);
          const slug = rawSlug.length > 60
            ? `${rawSlug.slice(0, 51).replace(/-+$/g, '')}-${branchHash}`
            : rawSlug;
          console.log(slug);
          NODE
            )"

            DEV_VERSION="${BASE_VERSION}-dev.branch-${BRANCH_SLUG}.${GITHUB_RUN_NUMBER}.${GITHUB_RUN_ATTEMPT}"
            DIST_TAG="branch-${BRANCH_SLUG}"
          fi

          echo "should_publish=true" >> "$GITHUB_OUTPUT"
          echo "version=$DEV_VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$DEV_TAG" >> "$GITHUB_OUTPUT"
          echo "dist_tag=$DIST_TAG" >> "$GITHUB_OUTPUT"
          echo "last_tag=$LAST_TAG" >> "$GITHUB_OUTPUT"
          echo "branch=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          echo "is_master=$IS_MASTER" >> "$GITHUB_OUTPUT"
          echo "short_sha=${GITHUB_SHA:0:12}" >> "$GITHUB_OUTPUT"

      - name: Summarize dev publish contents
        if: steps.dev.outputs.should_publish == 'true'
        env:
          LAST_TAG: ${{ steps.dev.outputs.last_tag }}
          DEV_VERSION: ${{ steps.dev.outputs.version }}
          DIST_TAG: ${{ steps.dev.outputs.dist_tag }}
          BRANCH_NAME: ${{ steps.dev.outputs.branch }}
          IS_MASTER: ${{ steps.dev.outputs.is_master }}
          SHORT_SHA: ${{ steps.dev.outputs.short_sha }}
        run: |
          set -euo pipefail
          {
            echo "## cogentlm dev publish"
            echo
            echo "- Source branch: \`$BRANCH_NAME\`"
            echo "- Commit: \`$SHORT_SHA\`"
            echo "- Version: \`$DEV_VERSION\`"
            echo "- Dist tag: \`$DIST_TAG\`"
            echo "- Install: \`npm install @noumena-labs/cogentlm@$DIST_TAG\`"
            if [ "$IS_MASTER" = "true" ]; then
              if [ -n "${LAST_TAG:-}" ]; then
                echo "- Previous dev tag: \`$LAST_TAG\`"
                echo
                echo "### Included PRs"
                git log --format='%s' "$LAST_TAG"..HEAD | grep -Eo '#[0-9]+' | sort -u || echo "No PR references found in commit subjects."
                echo
                echo "### Included commits"
                git log --oneline "$LAST_TAG"..HEAD
              else
                echo "- Previous dev tag: none"
                echo
                echo "### Included PRs"
                git log --format='%s' | grep -Eo '#[0-9]+' | sort -u || echo "No PR references found in commit subjects."
                echo
                echo "### Included commits"
                git log --oneline
              fi
            else
              echo
              echo "### Recent branch commits"
              git log --oneline -n 20
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Check out private llama.cpp submodule
        if: steps.dev.outputs.should_publish == 'true'
        env:
          LLAMA_CPP_INTERNAL_DEPLOY_KEY: ${{ secrets.LLAMA_CPP_INTERNAL_DEPLOY_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${LLAMA_CPP_INTERNAL_DEPLOY_KEY:-}" ]; then
            echo "::error::Set LLAMA_CPP_INTERNAL_DEPLOY_KEY to a read-only deploy key for noumena-labs/llama.cpp.internal."
            exit 1
          fi

          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$LLAMA_CPP_INTERNAL_DEPLOY_KEY" > ~/.ssh/llama_cpp_internal
          chmod 600 ~/.ssh/llama_cpp_internal
          ssh-keyscan github.com >> ~/.ssh/known_hosts

          GIT_SSH_COMMAND="ssh -i ~/.ssh/llama_cpp_internal -o IdentitiesOnly=yes" git submodule sync --recursive
          GIT_SSH_COMMAND="ssh -i ~/.ssh/llama_cpp_internal -o IdentitiesOnly=yes" git submodule update --init --recursive

      - name: Set up Node
        if: steps.dev.outputs.should_publish == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://npm.pkg.github.com
          scope: "@noumena-labs"

      - name: Set up Bun
        if: steps.dev.outputs.should_publish == 'true'
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install native build tools
        if: steps.dev.outputs.should_publish == 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build

      - name: Set up Emscripten
        if: steps.dev.outputs.should_publish == 'true'
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: latest

      - name: Install dependencies
        if: steps.dev.outputs.should_publish == 'true'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bun install --frozen-lockfile

      - name: Apply dev package version
        if: steps.dev.outputs.should_publish == 'true'
        env:
          DEV_VERSION: ${{ steps.dev.outputs.version }}
        run: |
          set -euo pipefail
          node <<'NODE'
          const fs = require('node:fs');

          const packageJsonPath = 'packages/cogentlm/package.json';
          const packageJson = JSON.parse(fs.readFileSync(packageJsonPath, 'utf8'));
          packageJson.version = process.env.DEV_VERSION;
          fs.writeFileSync(packageJsonPath, `${JSON.stringify(packageJson, null, 2)}\n`);
          NODE

      - name: Check GitHub Packages version availability
        if: steps.dev.outputs.should_publish == 'true'
        env:
          VERSION: ${{ steps.dev.outputs.version }}
          NODE_AUTH_TOKEN: ${{ secrets.PACKAGE_PUBLISH_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${NODE_AUTH_TOKEN:-}" ]; then
            echo "::error::Set PACKAGE_PUBLISH_TOKEN to a GitHub personal access token (classic) with repo, read:packages, and write:packages scopes."
            exit 1
          fi

          printf "@noumena-labs:registry=https://npm.pkg.github.com\n//npm.pkg.github.com/:_authToken=%s\n" "$NODE_AUTH_TOKEN" > "$RUNNER_TEMP/npmrc"
          export NPM_CONFIG_USERCONFIG="$RUNNER_TEMP/npmrc"

          VIEW_LOG="$RUNNER_TEMP/npm-view.log"
          if npm view "@noumena-labs/cogentlm@$VERSION" version --registry https://npm.pkg.github.com >"$VIEW_LOG" 2>&1; then
            echo "@noumena-labs/cogentlm@$VERSION already exists on GitHub Packages."
            exit 1
          fi

          if ! grep -Eq "E404|404 Not Found" "$VIEW_LOG"; then
            cat "$VIEW_LOG"
            exit 1
          fi

      - name: Run package tests
        if: steps.dev.outputs.should_publish == 'true'
        run: bun test packages/cogentlm/src

      - name: Build and validate package
        if: steps.dev.outputs.should_publish == 'true'
        run: bun run --filter=@noumena-labs/cogentlm release:prepare

      - name: Run built package smoke test
        if: steps.dev.outputs.should_publish == 'true'
        run: |
          node --input-type=module <<'NODE'
          const pkg = await import('./packages/cogentlm/dist/esm/index.js');
          if (typeof pkg.CogentEngine?.create !== 'function') {
            throw new Error('CogentEngine.create export is missing from the built package.');
          }
          NODE

      - name: Build browser consumer smoke app
        if: steps.dev.outputs.should_publish == 'true'
        run: bun run --filter=cogentlm-examples build

      - name: Configure GitHub Packages authentication
        if: steps.dev.outputs.should_publish == 'true'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.PACKAGE_PUBLISH_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${NODE_AUTH_TOKEN:-}" ]; then
            echo "::error::Set PACKAGE_PUBLISH_TOKEN to a GitHub personal access token (classic) with repo, read:packages, and write:packages scopes."
            exit 1
          fi
          printf "@noumena-labs:registry=https://npm.pkg.github.com\n//npm.pkg.github.com/:_authToken=%s\n" "$NODE_AUTH_TOKEN" > "$RUNNER_TEMP/npmrc"
          export NPM_CONFIG_USERCONFIG="$RUNNER_TEMP/npmrc"
          echo "NPM_CONFIG_USERCONFIG=$RUNNER_TEMP/npmrc" >> "$GITHUB_ENV"
          npm whoami --registry https://npm.pkg.github.com

      - name: Validate GitHub Packages publish
        if: steps.dev.outputs.should_publish == 'true'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.PACKAGE_PUBLISH_TOKEN }}
          DIST_TAG: ${{ steps.dev.outputs.dist_tag }}
        working-directory: packages/cogentlm
        run: npm publish --dry-run --registry https://npm.pkg.github.com --tag "$DIST_TAG"

      - name: Publish to GitHub Packages
        if: steps.dev.outputs.should_publish == 'true'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.PACKAGE_PUBLISH_TOKEN }}
          DIST_TAG: ${{ steps.dev.outputs.dist_tag }}
        working-directory: packages/cogentlm
        run: npm publish --registry https://npm.pkg.github.com --tag "$DIST_TAG"

      - name: Tag dev publish
        if: steps.dev.outputs.should_publish == 'true' && steps.dev.outputs.is_master == 'true'
        env:
          DEV_TAG: ${{ steps.dev.outputs.tag }}
          DEV_VERSION: ${{ steps.dev.outputs.version }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$DEV_TAG" -m "cogentlm dev $DEV_VERSION"
          git push origin "$DEV_TAG"
