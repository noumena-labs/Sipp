name: Release sipp packages

on:
  workflow_dispatch:
    inputs:
      package:
        description: Package endpoint to generate or publish
        required: true
        default: all
        type: choice
        options:
          - all
          - web-npm
          - node-npm
          - python
          - rust
      npm_tag:
        description: npm dist-tag to publish
        required: true
        default: latest
        type: string
      dry_run:
        description: Build and dry-run publish without publishing
        required: false
        default: true
        type: boolean
      pypi_wheel_scope:
        description: Python wheels to publish to PyPI
        required: true
        default: non-cuda
        type: choice
        options:
          - non-cuda
          - macos
          - all

permissions:
  actions: read
  contents: read

concurrency:
  group: release-sipp
  cancel-in-progress: false

env:
  CUDA_VERSION: "13.0"
  CUDA_PACKAGE_SUFFIX: "13-0"
  CUDA_WINDOWS_INSTALLER_URL: https://developer.download.nvidia.com/compute/cuda/13.0.3/local_installers/cuda_13.0.3_windows.exe
  NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  SIPP_MAX_GLIBC: "2.28"
  SIPP_MAX_WHEEL_MB: "100"

jobs:
  preflight:
    name: Release preflight
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    outputs:
      tag: ${{ steps.versions.outputs.tag }}
      version: ${{ steps.versions.outputs.version }}
    steps:
      - name: Require master for publishing
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ inputs.dry_run }}" = "false" ] && [ "${GITHUB_REF}" != "refs/heads/master" ]; then
            echo "::error::Publishing release packages must run from master."
            exit 1
          fi

      - name: Require green CI for release SHA
        if: ${{ inputs.dry_run == false }}
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          response="$(curl -fsS \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/$REPOSITORY/actions/workflows/ci.yml/runs?head_sha=$SHA&event=push&status=success&per_page=1")"
          if [ "$(jq '.total_count' <<< "$response")" -lt 1 ]; then
            echo "::error::Release SHA $SHA has no successful CI workflow run. Wait for CI to pass before publishing."
            exit 1
          fi

      - name: Require full public publish
        if: ${{ inputs.dry_run == false && inputs.package != 'all' }}
        shell: bash
        run: |
          echo "::error::Public registry publishing is full-release only. Run dry_run=true for package-specific validation, or dry_run=false with package=all."
          exit 1

      - name: Require registry credentials
        if: ${{ inputs.dry_run == false }}
        shell: bash
        env:
          CARGO_REGISTRY_TOKEN_PRESENT: ${{ secrets.CARGO_REGISTRY_TOKEN != '' }}
          NPM_TOKEN_PRESENT: ${{ secrets.NPM_TOKEN != '' }}
          PYPI_API_TOKEN_PRESENT: ${{ secrets.PYPI_API_TOKEN != '' }}
        run: |
          set -euo pipefail
          missing=0
          if [ "$NPM_TOKEN_PRESENT" != "true" ]; then
            echo "::error::NPM_TOKEN is required to publish @sipphq packages to npm."
            missing=1
          fi
          if [ "$CARGO_REGISTRY_TOKEN_PRESENT" != "true" ]; then
            echo "::error::CARGO_REGISTRY_TOKEN is required to publish sipp-rs and sipp-sys to crates.io."
            missing=1
          fi
          if [ "$PYPI_API_TOKEN_PRESENT" != "true" ]; then
            echo "::error::PYPI_API_TOKEN is required for the first PyPI release."
            missing=1
          fi
          exit "$missing"

      - name: Validate npm dist-tag
        shell: bash
        env:
          NPM_TAG: ${{ inputs.npm_tag }}
        run: |
          set -euo pipefail
          if ! [[ "$NPM_TAG" =~ ^[a-z][a-z0-9-]*$ ]]; then
            echo "::error::npm_tag '$NPM_TAG' must be a lowercase dist-tag such as latest, next, or beta."
            exit 1
          fi

      - name: Check out repository
        uses: actions/checkout@v6.0.2
        with:
          submodules: false

      - name: Resolve aligned version
        id: resolve
        uses: ./.github/actions/resolve-version

      - name: Check release tag
        id: versions
        shell: bash
        env:
          VERSION: ${{ steps.resolve.outputs.version }}
        run: |
          set -euo pipefail
          RELEASE_TAG="sipp-v$VERSION"
          level="error"
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            level="warning"
          fi
          if git ls-remote --exit-code --tags origin "refs/tags/$RELEASE_TAG" > /dev/null 2>&1; then
            echo "::${level}::Release tag $RELEASE_TAG already exists."
            if [ "${{ inputs.dry_run }}" != "true" ]; then
              exit 1
            fi
          fi
          latest_release_tag="$(git ls-remote --tags --refs origin 'sipp-v*' | awk -F/ '{ print $NF }' | sort -V | tail -1 || true)"
          echo "Latest remote Sipp release tag: ${latest_release_tag:-none}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$RELEASE_TAG" >> "$GITHUB_OUTPUT"

      - name: Check for already-published versions
        shell: bash
        env:
          PACKAGE: ${{ inputs.package }}
          DRY_RUN: ${{ inputs.dry_run }}
          PYPI_WHEEL_SCOPE: ${{ inputs.pypi_wheel_scope }}
          VERSION: ${{ steps.versions.outputs.version }}
        run: |
          set -euo pipefail

          level="error"
          if [ "$DRY_RUN" = "true" ]; then
            level="warning"
          fi
          conflicts=0

          case "$PYPI_WHEEL_SCOPE" in
            all|non-cuda|macos)
              ;;
            *)
              echo "::error::Unsupported pypi_wheel_scope: $PYPI_WHEEL_SCOPE"
              exit 1
              ;;
          esac

          check_npm() {
            local name="$1" version="$2" encoded status
            encoded="$(jq -rn --arg value "$name" '$value|@uri')"
            status=$(curl -s -o /tmp/npm-package.json -w '%{http_code}' "https://registry.npmjs.org/$encoded")
            if [ "$status" = "200" ] && jq -e --arg v "$version" '.versions[$v]' /tmp/npm-package.json > /dev/null; then
              echo "::${level}::$name@$version is already published to npm; bump the version before releasing."
              conflicts=1
            else
              echo "$name@$version is not yet on npm (registry status $status)."
            fi
          }

          check_pypi() {
            local name="$1" version="$2" status
            status=$(curl -s -o /dev/null -w '%{http_code}' "https://pypi.org/pypi/$name/$version/json")
            if [ "$status" = "200" ]; then
              echo "::warning::$name==$version is already published to PyPI; the upload step uses skip-existing so missing wheel files can still be added."
            else
              echo "$name==$version is not yet on PyPI (status $status)."
            fi
          }

          check_crate() {
            local name="$1" version="$2" status
            status=$(curl -s -H "User-Agent: sipp-release" -o /tmp/crate-package.json -w '%{http_code}' "https://crates.io/api/v1/crates/$name")
            if [ "$status" = "200" ] && jq -e --arg v "$version" '.versions[]? | select(.num == $v)' /tmp/crate-package.json > /dev/null; then
              echo "::warning::$name $version is already published to crates.io; the publish step will skip it."
            else
              echo "$name $version is not yet on crates.io (status $status)."
            fi
          }

          if [ "$PACKAGE" = "all" ] || [ "$PACKAGE" = "web-npm" ]; then
            check_npm @sipphq/sipp "$VERSION"
          fi
          if [ "$PACKAGE" = "all" ] || [ "$PACKAGE" = "node-npm" ]; then
            check_npm @sipphq/sipp-server "$VERSION"
            check_npm @sipphq/sipp-server-darwin-arm64 "$VERSION"
            check_npm @sipphq/sipp-server-darwin-x64 "$VERSION"
            check_npm @sipphq/sipp-server-linux-x64-gnu "$VERSION"
            check_npm @sipphq/sipp-server-win32-x64-msvc "$VERSION"
          fi
          if [ "$PACKAGE" = "all" ] || [ "$PACKAGE" = "python" ]; then
            check_pypi sipppy "$VERSION"
            check_pypi sipppy-backend-metal "$VERSION"
            case "$PYPI_WHEEL_SCOPE" in
              all)
                check_pypi sipppy-backend-cuda "$VERSION"
                check_pypi sipppy-backend-vulkan "$VERSION"
                ;;
              non-cuda)
                check_pypi sipppy-backend-vulkan "$VERSION"
                echo "Skipping CUDA PyPI preflight because pypi_wheel_scope=$PYPI_WHEEL_SCOPE."
                ;;
              macos)
                echo "Skipping CUDA and Vulkan PyPI preflight because pypi_wheel_scope=$PYPI_WHEEL_SCOPE."
                ;;
            esac
          fi
          if [ "$PACKAGE" = "all" ] || [ "$PACKAGE" = "rust" ]; then
            check_crate sipp-sys "$VERSION"
            check_crate sipp-rs "$VERSION"
          fi

          if [ "$conflicts" -eq 1 ] && [ "$DRY_RUN" != "true" ]; then
            exit 1
          fi

  gate:
    name: Release gate
    runs-on: ubuntu-24.04
    timeout-minutes: 150
    needs: preflight
    env:
      CE_WASM_BUILD_PARALLEL_LEVEL: "2"
    steps:
      - name: Check out repository
        uses: actions/checkout@v6.0.2
        with:
          submodules: recursive

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-emscripten
          components: rust-src

      - name: Set up CMake and Ninja
        uses: lukka/get-cmake@v4.3.1

      - name: Set up compiler cache
        if: ${{ runner.os != 'Windows' }}
        uses: hendrikmuhs/ccache-action@v1.2.23
        with:
          key: release-gate
          max-size: 3G

      - name: Cache Cargo and native build outputs
        uses: actions/cache@v5.0.5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            .build/cargo
            .build/cmake
            .build/c
          key: cargo-release-gate-${{ runner.os }}-${{ hashFiles('Cargo.lock', '.cargo/config.toml', 'crates/**/Cargo.toml', 'lib/**/Cargo.toml', 'apps/cli/Cargo.toml', 'xtask/Cargo.toml', 'bindings/**/Cargo.toml') }}
          restore-keys: |
            cargo-release-gate-${{ runner.os }}-

      - name: Cache hermetic build toolchains
        uses: actions/cache@v5.0.5
        with:
          path: |
            .build/toolchain
            .build/uv-cache
          key: sipp-toolchain-release-gate-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('xtask/src/toolchains/*.rs') }}
          restore-keys: |
            sipp-toolchain-release-gate-${{ runner.os }}-${{ runner.arch }}-

      - name: Run release source gate
        run: |
          cargo xtask --plain test unit --no-coverage suite xtask
          cargo xtask --plain test unit --no-coverage suite rust-crates
          cargo xtask --plain test unit --no-coverage suite rust-bindings
          cargo xtask --plain test unit --no-coverage suite api
          cargo xtask --plain test unit --no-coverage suite cli

  web-npm:
    name: Build web npm package
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    needs: gate
    if: ${{ inputs.package == 'all' || inputs.package == 'web-npm' }}
    env:
      CE_WASM_BUILD_PARALLEL_LEVEL: "2"
    steps:
      - name: Check out repository
        uses: actions/checkout@v6.0.2
        with:
          submodules: recursive

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-emscripten
          components: rust-src

      - name: Set up Node
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2.2.0
        with:
          bun-version: 1.3.11

      - name: Set up CMake and Ninja
        uses: lukka/get-cmake@v4.3.1

      - name: Set up compiler cache
        if: ${{ runner.os != 'Windows' }}
        uses: hendrikmuhs/ccache-action@v1.2.23
        with:
          key: release-web
          max-size: 3G

      - name: Cache Cargo and native build outputs
        uses: actions/cache@v5.0.5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            .build/cargo
            .build/cmake
            .build/c
          key: cargo-release-web-${{ runner.os }}-${{ hashFiles('Cargo.lock', '.cargo/config.toml', 'crates/**/Cargo.toml', 'lib/**/Cargo.toml', 'apps/cli/Cargo.toml', 'xtask/Cargo.toml', 'bindings/**/Cargo.toml') }}
          restore-keys: |
            cargo-release-web-${{ runner.os }}-

      - name: Cache hermetic build toolchains
        uses: actions/cache@v5.0.5
        with:
          path: |
            .build/toolchain
            .build/uv-cache
          key: sipp-toolchain-release-web-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('xtask/src/toolchains/*.rs') }}
          restore-keys: |
            sipp-toolchain-release-web-${{ runner.os }}-${{ runner.arch }}-

      - name: Install JavaScript workspace dependencies
        run: bun install --frozen-lockfile

      - name: Build staged web package
        run: cargo xtask --plain build wasm

      - name: Require staged web WASM artifacts
        shell: bash
        run: |
          set -euo pipefail
          for artifact in \
            .build/artifacts/npm/sipp/dist/wasm/sipp-wasm.js \
            .build/artifacts/npm/sipp/dist/wasm/sipp-wasm.wasm \
            .build/artifacts/npm/sipp/dist/wasm/sipp-wasm-pthread.js \
            .build/artifacts/npm/sipp/dist/wasm/sipp-wasm-pthread.wasm; do
            if [ ! -f "$artifact" ]; then
              echo "::error::Missing staged web WASM artifact: $artifact"
              exit 1
            fi
          done

      - name: Run web package import smoke
        run: |
          node --input-type=module <<'NODE'
          const pkg = await import('./.build/artifacts/npm/sipp/dist/esm/index.js');
          if (typeof pkg.SippClient !== 'function') {
            throw new Error('SippClient export is missing from the staged package.');
          }
          NODE

      - name: Prepare public web npm metadata
        working-directory: .build/artifacts/npm/sipp
        run: |
          node --input-type=module <<'NODE'
          import { readFileSync, writeFileSync } from 'node:fs';
          const pkg = JSON.parse(readFileSync('package.json', 'utf8'));
          pkg.name = '@sipphq/sipp';
          pkg.publishConfig = { registry: 'https://registry.npmjs.org', access: 'public' };
          writeFileSync('package.json', `${JSON.stringify(pkg, null, 2)}\n`);
          NODE

      - name: Upload web npm artifact
        uses: actions/upload-artifact@v6.0.0
        with:
          name: sipp-web-npm
          path: .build/artifacts/npm/sipp

      - name: Validate web npm publish
        env:
          NPM_TAG: ${{ inputs.npm_tag }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        working-directory: .build/artifacts/npm/sipp
        run: npm publish --dry-run --registry https://registry.npmjs.org --tag "$NPM_TAG" --access public

  native:
    name: Run native artifact workflow
    needs: gate
    if: ${{ inputs.package == 'all' || inputs.package == 'node-npm' || inputs.package == 'python' || inputs.package == 'rust' }}
    permissions:
      contents: read
      packages: read
    uses: ./.github/workflows/build-native.yml
    with:
      package: ${{ inputs.package }}
      node-registry: https://registry.npmjs.org
      enforce: true
      pypi-wheel-scope: ${{ inputs.pypi_wheel_scope }}

  node-npm:
    name: Assemble Node npm packages
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    needs: native
    if: ${{ inputs.package == 'all' || inputs.package == 'node-npm' }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v6.0.2
        with:
          submodules: false

      - name: Set up Node
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2.2.0
        with:
          bun-version: 1.3.11

      - name: Install JavaScript workspace dependencies
        run: bun install --frozen-lockfile

      - name: Download Node native artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: sipp-node-native-*
          path: .build/artifacts/node
          merge-multiple: true

      - name: Stage public Node server packages
        working-directory: lib/node
        env:
          SIPP_NODE_PACKAGE_ACCESS: public
          SIPP_NODE_PACKAGE_NAME: "@sipphq/sipp-server"
          SIPP_NODE_PACKAGE_REGISTRY: https://registry.npmjs.org
        run: bun run build:stage

      - name: Install staged packages and require router
        shell: bash
        run: |
          set -euo pipefail
          wrapper_dir=.build/artifacts/npm/sipp-server
          platform_dir=.build/artifacts/npm/sipp-server-linux-x64-gnu
          if [ ! -d "$platform_dir" ]; then
            echo "::error::Staged linux-x64-gnu platform package is missing."
            exit 1
          fi
          package_name="$(node -p "require('./$wrapper_dir/package.json').name")"
          smoke_dir="$RUNNER_TEMP/sipp-npm-smoke"
          rm -rf "$smoke_dir"
          mkdir -p "$smoke_dir"
          wrapper_tgz="$(npm pack "./$wrapper_dir" --pack-destination "$smoke_dir" --json | jq -r '.[0].filename')"
          platform_tgz="$(npm pack "./$platform_dir" --pack-destination "$smoke_dir" --json | jq -r '.[0].filename')"
          cd "$smoke_dir"
          npm init -y > /dev/null
          npm install --no-audit --no-fund --omit=optional "./$platform_tgz" "./$wrapper_tgz"
          SMOKE_PACKAGE_NAME="$package_name" SIPP_NODE_BACKEND=cpu node -e '
            const wrapper = require(process.env.SMOKE_PACKAGE_NAME);
            const backend = wrapper.getActiveBackend();
            if (backend !== "cpu") {
              throw new Error(`expected cpu backend from staged packages, got ${backend}`);
            }
            console.log(`Loaded ${process.env.SMOKE_PACKAGE_NAME} from staged tarballs with backend=${backend}`);
          '

      - name: Upload Node npm artifacts
        uses: actions/upload-artifact@v6.0.0
        with:
          name: sipp-server-npm
          path: |
            .build/artifacts/npm/sipp-server
            .build/artifacts/npm/sipp-server-*

      - name: Validate Node npm publish
        shell: bash
        env:
          NPM_TAG: ${{ inputs.npm_tag }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          for package_dir in .build/artifacts/npm/sipp-server-* .build/artifacts/npm/sipp-server; do
            [ -d "$package_dir" ] || continue
            npm publish "$package_dir" --dry-run --registry https://registry.npmjs.org --tag "$NPM_TAG" --access public
          done

  python:
    name: Combine Python wheels
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    needs: native
    if: ${{ inputs.package == 'all' || inputs.package == 'python' }}
    steps:
      - name: Download Python wheel artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: sipp-python-wheels-*
          path: .build/artifacts/python
          merge-multiple: true

      - name: Upload combined Python wheel artifact
        uses: actions/upload-artifact@v6.0.0
        with:
          name: sipp-python-wheels
          path: .build/artifacts/python/*.whl

  rust-source:
    name: Package Rust crates
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    needs:
      - native
      - preflight
    if: ${{ inputs.package == 'all' || inputs.package == 'rust' }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v6.0.2
        with:
          submodules: recursive

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rust-src

      - name: Set up CMake and Ninja
        uses: lukka/get-cmake@v4.3.1

      - name: Cache Cargo and native build outputs
        uses: actions/cache@v5.0.5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            .build/cargo
            .build/cmake
            .build/c
          key: cargo-release-rust-package-${{ runner.os }}-${{ hashFiles('Cargo.lock', '.cargo/config.toml', 'crates/**/Cargo.toml', 'lib/**/Cargo.toml', 'apps/cli/Cargo.toml', 'xtask/Cargo.toml', 'bindings/**/Cargo.toml') }}
          restore-keys: |
            cargo-release-rust-package-${{ runner.os }}-

      - name: Validate and package Rust crates
        shell: bash
        env:
          VERSION: ${{ needs.preflight.outputs.version }}
        run: |
          set -euo pipefail
          target_dir="$(cargo metadata --no-deps --format-version 1 | jq -r '.target_directory')"
          package_dir="$target_dir/package"
          mkdir -p "$package_dir"
          rm -f "$package_dir/sipp-sys-$VERSION.crate" "$package_dir/sipp-rs-$VERSION.crate"

          cargo publish -p sipp-sys --dry-run
          cargo package -p sipp-sys --allow-dirty --no-verify

          status=$(curl -s -H "User-Agent: sipp-release" -o /tmp/sipp-sys.json -w '%{http_code}' "https://crates.io/api/v1/crates/sipp-sys")
          if [ "$status" = "200" ] && jq -e --arg v "$VERSION" '.versions[]? | select(.num == $v)' /tmp/sipp-sys.json > /dev/null; then
            cargo publish -p sipp-rs --dry-run
            cargo package -p sipp-rs --allow-dirty --no-verify
          else
            echo "Skipping sipp-rs dry-run publish validation and packaging because sipp-sys $VERSION is not yet on crates.io."
          fi

          mkdir -p .build/artifacts/rust
          cp "$package_dir/sipp-sys-$VERSION.crate" .build/artifacts/rust/
          if [ -f "$package_dir/sipp-rs-$VERSION.crate" ]; then
            cp "$package_dir/sipp-rs-$VERSION.crate" .build/artifacts/rust/
          fi

      - name: Upload Rust crate artifacts
        uses: actions/upload-artifact@v6.0.0
        with:
          name: sipp-rust-crates
          path: .build/artifacts/rust/*.crate

  publish-release:
    name: Publish public release
    runs-on: ubuntu-24.04
    timeout-minutes: 180
    needs:
      - preflight
      - web-npm
      - node-npm
      - python
      - rust-source
    if: ${{ inputs.dry_run == false && inputs.package == 'all' }}
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v6.0.2
        with:
          submodules: recursive

      - name: Set up Node
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rust-src

      - name: Set up CMake and Ninja
        uses: lukka/get-cmake@v4.3.1

      - name: Cache Cargo and native build outputs
        uses: actions/cache@v5.0.5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            .build/cargo
            .build/cmake
            .build/c
          key: cargo-release-final-publish-${{ runner.os }}-${{ hashFiles('Cargo.lock', '.cargo/config.toml', 'crates/**/Cargo.toml', 'lib/**/Cargo.toml', 'apps/cli/Cargo.toml', 'xtask/Cargo.toml', 'bindings/**/Cargo.toml') }}
          restore-keys: |
            cargo-release-final-publish-${{ runner.os }}-

      - name: Download web npm artifact
        uses: actions/download-artifact@v8
        with:
          name: sipp-web-npm
          path: .build/artifacts/npm/sipp

      - name: Download Node npm artifacts
        uses: actions/download-artifact@v8
        with:
          name: sipp-server-npm
          path: .build/artifacts/npm

      - name: Download Python wheels
        uses: actions/download-artifact@v8
        with:
          name: sipp-python-wheels
          path: .build/artifacts/python

      - name: Download Rust crate packages
        uses: actions/download-artifact@v8
        with:
          name: sipp-rust-crates
          path: .build/release-assets

      - name: Stage GitHub release assets
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .build/release-assets
          cp .build/artifacts/python/*.whl .build/release-assets/

      - name: Stage PyPI upload wheels
        shell: bash
        env:
          PYPI_WHEEL_SCOPE: ${{ inputs.pypi_wheel_scope }}
        run: |
          set -euo pipefail
          shopt -s nullglob

          rm -rf .build/artifacts/pypi
          mkdir -p .build/artifacts/pypi

          case "$PYPI_WHEEL_SCOPE" in
            all)
              wheels=(.build/artifacts/python/*.whl)
              ;;
            non-cuda)
              wheels=()
              for wheel in .build/artifacts/python/*.whl; do
                if [[ "$(basename "$wheel")" == sipppy_backend_cuda-* ]]; then
                  continue
                fi
                wheels+=("$wheel")
              done
              ;;
            macos)
              wheels=(.build/artifacts/python/*macosx*.whl)
              ;;
            *)
              echo "::error::Unsupported pypi_wheel_scope: $PYPI_WHEEL_SCOPE"
              exit 1
              ;;
          esac

          if [ "${#wheels[@]}" -eq 0 ]; then
            echo "::error::No Python wheels matched pypi_wheel_scope=$PYPI_WHEEL_SCOPE."
            exit 1
          fi

          cp "${wheels[@]}" .build/artifacts/pypi/
          printf 'Staged %s PyPI wheel(s) for scope %s:\n' "${#wheels[@]}" "$PYPI_WHEEL_SCOPE"
          printf '  %s\n' "${wheels[@]##*/}"

      - name: Assert final artifact set
        shell: bash
        env:
          PYPI_WHEEL_SCOPE: ${{ inputs.pypi_wheel_scope }}
        run: |
          set -euo pipefail
          shopt -s nullglob

          missing=0
          require_file() {
            local path="$1"
            if [ ! -f "$path" ]; then
              echo "::error::Missing release artifact: $path"
              missing=1
            fi
          }
          require_glob() {
            local label="$1"; shift
            local matches=("$@")
            if [ "${#matches[@]}" -eq 0 ]; then
              echo "::error::Missing release artifacts matching $label"
              missing=1
            fi
          }

          require_file .build/artifacts/npm/sipp/package.json
          require_file .build/artifacts/npm/sipp/dist/wasm/sipp-wasm.js
          require_file .build/artifacts/npm/sipp/dist/wasm/sipp-wasm.wasm
          require_file .build/artifacts/npm/sipp/dist/wasm/sipp-wasm-pthread.js
          require_file .build/artifacts/npm/sipp/dist/wasm/sipp-wasm-pthread.wasm
          require_file .build/artifacts/npm/sipp-server/package.json
          require_glob "node platform packages" .build/artifacts/npm/sipp-server-*/package.json
          require_glob "Python sipppy wheels" .build/artifacts/python/sipppy-*.whl
          require_glob "Python CUDA backend wheels" .build/artifacts/python/sipppy_backend_cuda-*.whl
          require_glob "Python Vulkan backend wheels" .build/artifacts/python/sipppy_backend_vulkan-*.whl
          require_glob "Python Metal backend wheels" .build/artifacts/python/sipppy_backend_metal-*.whl
          require_glob "PyPI upload wheels" .build/artifacts/pypi/*.whl
          require_glob "Rust sipp-sys crate package" .build/release-assets/sipp-sys-*.crate

          if [ "$PYPI_WHEEL_SCOPE" = "macos" ]; then
            require_glob "PyPI macOS wheels" .build/artifacts/pypi/*macosx*.whl
            non_macos=(.build/artifacts/pypi/*.whl)
            for wheel in "${non_macos[@]}"; do
              if [[ "$(basename "$wheel")" != *macosx* ]]; then
                echo "::error::Non-macOS wheel staged for macOS-only PyPI upload: $wheel"
                missing=1
              fi
            done
          fi

          if [ "$PYPI_WHEEL_SCOPE" = "non-cuda" ]; then
            require_glob "PyPI sipppy wheels" .build/artifacts/pypi/sipppy-*.whl
            require_glob "PyPI Vulkan backend wheels" .build/artifacts/pypi/sipppy_backend_vulkan-*.whl
            require_glob "PyPI Metal backend wheels" .build/artifacts/pypi/sipppy_backend_metal-*.whl
            cuda_wheels=(.build/artifacts/pypi/sipppy_backend_cuda-*.whl)
            if [ "${#cuda_wheels[@]}" -ne 0 ]; then
              printf '::error::CUDA wheel staged for non-CUDA PyPI upload: %s\n' "${cuda_wheels[@]}"
              missing=1
            fi
          fi

          exit "$missing"

      - name: Publish Rust dependency crate
        shell: bash
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
          VERSION: ${{ needs.preflight.outputs.version }}
        run: |
          set -euo pipefail

          crate_version_exists() {
            local crate="$1" version="$2" status
            status=$(curl -s -H "User-Agent: sipp-release" -o /tmp/crate-version.json -w '%{http_code}' "https://crates.io/api/v1/crates/$crate")
            [ "$status" = "200" ] && jq -e --arg v "$version" '.versions[]? | select(.num == $v)' /tmp/crate-version.json > /dev/null
          }

          wait_for_crate_version() {
            local crate="$1" version="$2"
            for attempt in {1..60}; do
              if crate_version_exists "$crate" "$version"; then
                return 0
              fi
              echo "Waiting for $crate $version to appear in crates.io index ($attempt/60)."
              sleep 10
            done
            echo "::error::$crate $version did not appear in crates.io after publishing."
            return 1
          }

          if crate_version_exists sipp-sys "$VERSION"; then
            echo "sipp-sys $VERSION is already published; skipping."
          else
            cargo publish -p sipp-sys
          fi
          wait_for_crate_version sipp-sys "$VERSION"
          cargo publish -p sipp-rs --dry-run

      - name: Publish npm packages
        shell: bash
        env:
          NPM_TAG: ${{ inputs.npm_tag }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          shopt -s nullglob

          npm_version_exists() {
            local name="$1" version="$2" encoded status
            encoded="$(jq -rn --arg value "$name" '$value|@uri')"
            status=$(curl -s -o /tmp/npm-package.json -w '%{http_code}' "https://registry.npmjs.org/$encoded")
            [ "$status" = "200" ] && jq -e --arg v "$version" '.versions[$v]' /tmp/npm-package.json > /dev/null
          }

          publish_npm_package() {
            local package_dir="$1" name version
            name="$(node -p "require('./$package_dir/package.json').name")"
            version="$(node -p "require('./$package_dir/package.json').version")"
            if npm_version_exists "$name" "$version"; then
              echo "$name@$version is already published; skipping."
              return
            fi
            npm publish "$package_dir" --registry https://registry.npmjs.org --tag "$NPM_TAG" --access public
          }

          publish_npm_package .build/artifacts/npm/sipp
          for package_dir in .build/artifacts/npm/sipp-server-*; do
            publish_npm_package "$package_dir"
          done
          publish_npm_package .build/artifacts/npm/sipp-server

      - name: Choose PyPI publish authentication
        id: pypi-auth
        shell: bash
        env:
          PYPI_API_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          set -euo pipefail
          if [ -n "$PYPI_API_TOKEN" ]; then
            echo "mode=token" >> "$GITHUB_OUTPUT"
            echo "Using PYPI_API_TOKEN for Python package publish."
          else
            echo "mode=trusted-publisher" >> "$GITHUB_OUTPUT"
            echo "Using PyPI Trusted Publishing for Python package publish."
          fi

      - name: Publish Python packages to PyPI with API token
        if: ${{ steps.pypi-auth.outputs.mode == 'token' }}
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: .build/artifacts/pypi
          skip-existing: true
          user: __token__
          password: ${{ secrets.PYPI_API_TOKEN }}

      - name: Publish Python packages to PyPI with Trusted Publishing
        if: ${{ steps.pypi-auth.outputs.mode == 'trusted-publisher' }}
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: .build/artifacts/pypi
          skip-existing: true

      - name: Publish Rust facade crate
        shell: bash
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
          VERSION: ${{ needs.preflight.outputs.version }}
        run: |
          set -euo pipefail

          crate_version_exists() {
            local crate="$1" version="$2" status
            status=$(curl -s -H "User-Agent: sipp-release" -o /tmp/crate-version.json -w '%{http_code}' "https://crates.io/api/v1/crates/$crate")
            [ "$status" = "200" ] && jq -e --arg v "$version" '.versions[]? | select(.num == $v)' /tmp/crate-version.json > /dev/null
          }

          if crate_version_exists sipp-rs "$VERSION"; then
            echo "sipp-rs $VERSION is already published; skipping."
          else
            cargo publish -p sipp-rs
          fi
          target_dir="$(cargo metadata --no-deps --format-version 1 | jq -r '.target_directory')"
          cargo package -p sipp-rs --allow-dirty --no-verify
          cp "$target_dir/package/sipp-rs-$VERSION.crate" .build/release-assets/

      - name: Tag published version
        shell: bash
        env:
          RELEASE_TAG: ${{ needs.preflight.outputs.tag }}
        run: |
          set -euo pipefail
          remote_tag_sha="$(git ls-remote --tags origin "refs/tags/$RELEASE_TAG" | awk '{ print $1 }' || true)"
          if [ -n "$remote_tag_sha" ]; then
            if [ "$remote_tag_sha" != "$GITHUB_SHA" ]; then
              echo "::error::Release tag $RELEASE_TAG already exists at $remote_tag_sha, not $GITHUB_SHA."
              exit 1
            fi
            echo "Release tag $RELEASE_TAG already exists at $GITHUB_SHA."
          else
            git tag "$RELEASE_TAG"
            git push origin "$RELEASE_TAG"
            echo "Tagged $GITHUB_SHA as $RELEASE_TAG" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.preflight.outputs.tag }}
          name: ${{ needs.preflight.outputs.tag }}
          generate_release_notes: true
          files: .build/release-assets/**
