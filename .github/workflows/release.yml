name: Release cogentlm

on:
  workflow_dispatch:
    inputs:
      npm_tag:
        description: npm dist-tag to publish
        required: true
        default: latest
        type: string
      dry_run:
        description: Build and dry-run publish without publishing
        required: false
        default: true
        type: boolean

permissions:
  contents: read
  packages: read
  id-token: write

concurrency:
  group: release-cogentlm
  cancel-in-progress: false

jobs:
  release:
    name: Validate and publish release package
    runs-on: ubuntu-latest
    env:
      CE_WASM_BUILD_PARALLEL_LEVEL: "2"
    steps:
      - name: Require master
        run: |
          if [ "${GITHUB_REF}" != "refs/heads/master" ]; then
            echo "::error::Release workflow must run from master."
            exit 1
          fi

      - name: Check out repository
        uses: actions/checkout@v6.0.2
        with:
          submodules: false

      - name: Check out private llama.cpp submodule
        env:
          LLAMA_CPP_INTERNAL_DEPLOY_KEY: ${{ secrets.LLAMA_CPP_INTERNAL_DEPLOY_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${LLAMA_CPP_INTERNAL_DEPLOY_KEY:-}" ]; then
            echo "::error::Set LLAMA_CPP_INTERNAL_DEPLOY_KEY to a read-only deploy key for noumena-labs/llama.cpp."
            exit 1
          fi
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$LLAMA_CPP_INTERNAL_DEPLOY_KEY" > ~/.ssh/llama_cpp_internal
          chmod 600 ~/.ssh/llama_cpp_internal
          ssh-keyscan github.com >> ~/.ssh/known_hosts
          GIT_SSH_COMMAND="ssh -i ~/.ssh/llama_cpp_internal -o IdentitiesOnly=yes" git submodule sync --recursive
          GIT_SSH_COMMAND="ssh -i ~/.ssh/llama_cpp_internal -o IdentitiesOnly=yes" git submodule update --init --recursive

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-emscripten
          components: rust-src

      - name: Set up Node
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2.2.0
        with:
          bun-version: 1.3.11

      - name: Set up CMake and Ninja
        uses: lukka/get-cmake@latest

      - name: Set up Emscripten
        uses: emscripten-core/setup-emsdk@v16

      - name: Cache Cargo and native build outputs
        uses: actions/cache@v5.0.5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            .build/cargo
            .build/cmake
            .build/c
          key: cargo-release-${{ runner.os }}-${{ hashFiles('Cargo.lock', '.cargo/config.toml', 'crates/**/Cargo.toml', 'bindings/**/Cargo.toml') }}
          restore-keys: |
            cargo-release-${{ runner.os }}-

      - name: Cache Bun dependencies
        uses: actions/cache@v5.0.5
        with:
          path: |
            ~/.bun/install/cache
            node_modules
            packages/npm/node_modules
            bindings/node/node_modules
            apps/*/node_modules
          key: bun-release-${{ runner.os }}-${{ hashFiles('bun.lock', 'bindings/node/bun.lock', 'package.json', 'packages/npm/package.json', 'bindings/node/package.json', 'apps/*/package.json') }}
          restore-keys: |
            bun-release-${{ runner.os }}-

      - name: Cache xtask toolchains
        uses: actions/cache@v5.0.5
        with:
          path: |
            .build/toolchain
            .build/uv-cache
          key: xtask-toolchain-release-${{ runner.os }}-${{ hashFiles('crates/xtask/src/toolchains/*.rs') }}
          restore-keys: |
            xtask-toolchain-release-${{ runner.os }}-

      - name: Cache sample models
        uses: actions/cache@v5.0.5
        with:
          path: .build/models
          key: sample-models-release-${{ runner.os }}-${{ hashFiles('crates/xtask/src/sample_model.rs') }}
          restore-keys: |
            sample-models-release-${{ runner.os }}-

      - name: Install dependencies
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bun install --frozen-lockfile

      - name: Run full release test workflow
        run: cargo xtask --plain test all --backend cpu

      - name: Build staged browser package
        run: cargo xtask --plain build wasm

      - name: Run staged package import smoke
        run: |
          node --input-type=module <<'NODE'
          const pkg = await import('./.build/artifacts/npm/cogentlm-browser/dist/esm/index.js');
          if (typeof pkg.CogentClient !== 'function') {
            throw new Error('CogentClient export is missing from the staged package.');
          }
          NODE

      - name: Prepare public npm package metadata
        working-directory: .build/artifacts/npm/cogentlm-browser
        run: |
          node --input-type=module <<'NODE'
          import { readFileSync, writeFileSync } from 'node:fs';
          const pkg = JSON.parse(readFileSync('package.json', 'utf8'));
          pkg.name = 'cogentlm';
          pkg.publishConfig = { registry: 'https://registry.npmjs.org', access: 'public' };
          writeFileSync('package.json', `${JSON.stringify(pkg, null, 2)}\n`);
          NODE

      - name: Validate npm publish
        env:
          NPM_TAG: ${{ inputs.npm_tag }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        working-directory: .build/artifacts/npm/cogentlm-browser
        run: npm publish --dry-run --registry https://registry.npmjs.org --tag "$NPM_TAG"

      - name: Publish to npm
        if: ${{ inputs.dry_run == false }}
        env:
          NPM_TAG: ${{ inputs.npm_tag }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        working-directory: .build/artifacts/npm/cogentlm-browser
        run: npm publish --registry https://registry.npmjs.org --tag "$NPM_TAG"
