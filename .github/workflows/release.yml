name: Release sipp packages

on:
  workflow_dispatch:
    inputs:
      package:
        description: Package endpoint to generate or publish
        required: true
        default: all
        type: choice
        options:
          - all
          - web-npm
          - node-npm
          - python
          - rust
      npm_tag:
        description: npm dist-tag to publish
        required: true
        default: latest
        type: string
      dry_run:
        description: Build and dry-run publish without publishing
        required: false
        default: true
        type: boolean

permissions:
  contents: read

concurrency:
  group: release-sipp
  cancel-in-progress: false

env:
  CUDA_VERSION: "13.3"
  CUDA_PACKAGE_SUFFIX: "13-3"
  CUDA_WINDOWS_INSTALLER_URL: https://developer.download.nvidia.com/compute/cuda/13.3.0/local_installers/cuda_13.3.0_windows.exe
  NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  SIPP_MAX_GLIBC: "2.35"
  SIPP_MAX_WHEEL_MB: "100"

jobs:
  preflight:
    name: Release preflight
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    outputs:
      tag: ${{ steps.versions.outputs.tag }}
      version: ${{ steps.versions.outputs.version }}
    steps:
      - name: Require master for publishing
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ inputs.dry_run }}" = "false" ] && [ "${GITHUB_REF}" != "refs/heads/master" ]; then
            echo "::error::Publishing release packages must run from master."
            exit 1
          fi

      - name: Validate npm dist-tag
        shell: bash
        env:
          NPM_TAG: ${{ inputs.npm_tag }}
        run: |
          set -euo pipefail
          if ! [[ "$NPM_TAG" =~ ^[a-z][a-z0-9-]*$ ]]; then
            echo "::error::npm_tag '$NPM_TAG' must be a lowercase dist-tag such as latest, next, or beta."
            exit 1
          fi

      - name: Block unsupported Rust crates.io publish
        if: ${{ inputs.dry_run == false && inputs.package == 'rust' }}
        shell: bash
        run: |
          echo "::error::Rust crates.io publishing is pending publish wiring for the sipp and sipp-sys crates (vendored llama.cpp sign-off, registry credentials, and cargo publish ordering). Run a dry run to generate the Rust source artifact, or choose all, web-npm, node-npm, or python."
          exit 1

      - name: Check out repository
        uses: actions/checkout@v6.0.2
        with:
          submodules: false

      - name: Resolve aligned version
        id: resolve
        uses: ./.github/actions/resolve-version

      - name: Check release tag
        id: versions
        shell: bash
        env:
          VERSION: ${{ steps.resolve.outputs.version }}
        run: |
          set -euo pipefail
          RELEASE_TAG="sipp-v$VERSION"
          level="error"
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            level="warning"
          fi
          if git ls-remote --exit-code --tags origin "refs/tags/$RELEASE_TAG" > /dev/null 2>&1; then
            echo "::${level}::Release tag $RELEASE_TAG already exists."
            if [ "${{ inputs.dry_run }}" != "true" ]; then
              exit 1
            fi
          fi
          latest_release_tag="$(git ls-remote --tags --refs origin 'sipp-v*' | awk -F/ '{ print $NF }' | sort -V | tail -1 || true)"
          echo "Latest remote Sipp release tag: ${latest_release_tag:-none}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$RELEASE_TAG" >> "$GITHUB_OUTPUT"

      - name: Check for already-published versions
        shell: bash
        env:
          PACKAGE: ${{ inputs.package }}
          DRY_RUN: ${{ inputs.dry_run }}
          VERSION: ${{ steps.versions.outputs.version }}
        run: |
          set -euo pipefail

          level="error"
          if [ "$DRY_RUN" = "true" ]; then
            level="warning"
          fi
          conflicts=0

          check_npm() {
            local name="$1" version="$2" status
            status=$(curl -s -o /tmp/npm-package.json -w '%{http_code}' "https://registry.npmjs.org/$name")
            if [ "$status" = "200" ] && jq -e --arg v "$version" '.versions[$v]' /tmp/npm-package.json > /dev/null; then
              echo "::${level}::$name@$version is already published to npm; bump the version before releasing."
              conflicts=1
            else
              echo "$name@$version is not yet on npm (registry status $status)."
            fi
          }

          check_pypi() {
            local name="$1" version="$2" status
            status=$(curl -s -o /dev/null -w '%{http_code}' "https://pypi.org/pypi/$name/$version/json")
            if [ "$status" = "200" ]; then
              echo "::${level}::$name==$version is already published to PyPI; bump the version before releasing."
              conflicts=1
            else
              echo "$name==$version is not yet on PyPI (status $status)."
            fi
          }

          if [ "$PACKAGE" = "all" ] || [ "$PACKAGE" = "web-npm" ]; then
            check_npm sipp "$VERSION"
          fi
          if [ "$PACKAGE" = "all" ] || [ "$PACKAGE" = "node-npm" ]; then
            check_npm sipp-server "$VERSION"
            check_npm sipp-server-darwin-arm64 "$VERSION"
            check_npm sipp-server-darwin-x64 "$VERSION"
            check_npm sipp-server-linux-x64-gnu "$VERSION"
            check_npm sipp-server-win32-x64-msvc "$VERSION"
          fi
          if [ "$PACKAGE" = "all" ] || [ "$PACKAGE" = "python" ]; then
            check_pypi sipp "$VERSION"
          fi

          if [ "$conflicts" -eq 1 ] && [ "$DRY_RUN" != "true" ]; then
            exit 1
          fi

  gate:
    name: Release gate
    runs-on: ubuntu-24.04
    timeout-minutes: 150
    needs: preflight
    env:
      CE_WASM_BUILD_PARALLEL_LEVEL: "2"
    steps:
      - name: Check out repository
        uses: actions/checkout@v6.0.2
        with:
          submodules: recursive

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-emscripten
          components: rust-src

      - name: Set up Node
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2.2.0
        with:
          bun-version: 1.3.11

      - name: Set up CMake and Ninja
        uses: lukka/get-cmake@v4.3.1

      - name: Set up compiler cache
        if: ${{ runner.os != 'Windows' }}
        uses: hendrikmuhs/ccache-action@v1.2.23
        with:
          key: release-gate
          max-size: 3G

      - name: Cache Cargo and native build outputs
        uses: actions/cache@v5.0.5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            .build/cargo
            .build/cmake
            .build/c
          key: cargo-release-gate-${{ runner.os }}-${{ hashFiles('Cargo.lock', '.cargo/config.toml', 'crates/**/Cargo.toml', 'lib/**/Cargo.toml', 'apps/cli/Cargo.toml', 'xtask/Cargo.toml', 'bindings/**/Cargo.toml') }}
          restore-keys: |
            cargo-release-gate-${{ runner.os }}-

      - name: Cache hermetic build toolchains
        uses: actions/cache@v5.0.5
        with:
          path: |
            .build/toolchain
            .build/uv-cache
          key: sipp-toolchain-release-gate-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('xtask/src/toolchains/*.rs') }}
          restore-keys: |
            sipp-toolchain-release-gate-${{ runner.os }}-${{ runner.arch }}-

      - name: Cache sample models
        uses: actions/cache@v5.0.5
        with:
          path: .build/models
          key: sample-models-release-gate-${{ runner.os }}-${{ hashFiles('xtask/src/sample_model.rs') }}
          restore-keys: |
            sample-models-release-gate-${{ runner.os }}-

      - name: Install JavaScript workspace dependencies
        run: bun install --frozen-lockfile

      - name: Run full release test workflow
        run: |
          cargo xtask --plain test unit group full
          cargo xtask --plain test smoke group full --backend cpu

  web-npm:
    name: Build web npm package
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    needs: gate
    if: ${{ inputs.package == 'all' || inputs.package == 'web-npm' }}
    env:
      CE_WASM_BUILD_PARALLEL_LEVEL: "2"
    steps:
      - name: Check out repository
        uses: actions/checkout@v6.0.2
        with:
          submodules: recursive

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-emscripten
          components: rust-src

      - name: Set up Node
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2.2.0
        with:
          bun-version: 1.3.11

      - name: Set up CMake and Ninja
        uses: lukka/get-cmake@v4.3.1

      - name: Set up compiler cache
        if: ${{ runner.os != 'Windows' }}
        uses: hendrikmuhs/ccache-action@v1.2.23
        with:
          key: release-web
          max-size: 3G

      - name: Cache Cargo and native build outputs
        uses: actions/cache@v5.0.5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            .build/cargo
            .build/cmake
            .build/c
          key: cargo-release-web-${{ runner.os }}-${{ hashFiles('Cargo.lock', '.cargo/config.toml', 'crates/**/Cargo.toml', 'lib/**/Cargo.toml', 'apps/cli/Cargo.toml', 'xtask/Cargo.toml', 'bindings/**/Cargo.toml') }}
          restore-keys: |
            cargo-release-web-${{ runner.os }}-

      - name: Cache hermetic build toolchains
        uses: actions/cache@v5.0.5
        with:
          path: |
            .build/toolchain
            .build/uv-cache
          key: sipp-toolchain-release-web-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('xtask/src/toolchains/*.rs') }}
          restore-keys: |
            sipp-toolchain-release-web-${{ runner.os }}-${{ runner.arch }}-

      - name: Install JavaScript workspace dependencies
        run: bun install --frozen-lockfile

      - name: Build staged web package
        run: cargo xtask --plain build wasm

      - name: Run web package import smoke
        run: |
          node --input-type=module <<'NODE'
          const pkg = await import('./.build/artifacts/npm/sipp/dist/esm/index.js');
          if (typeof pkg.SippClient !== 'function') {
            throw new Error('SippClient export is missing from the staged package.');
          }
          NODE

      - name: Prepare public web npm metadata
        working-directory: .build/artifacts/npm/sipp
        run: |
          node --input-type=module <<'NODE'
          import { readFileSync, writeFileSync } from 'node:fs';
          const pkg = JSON.parse(readFileSync('package.json', 'utf8'));
          pkg.name = 'sipp';
          pkg.publishConfig = { registry: 'https://registry.npmjs.org', access: 'public' };
          writeFileSync('package.json', `${JSON.stringify(pkg, null, 2)}\n`);
          NODE

      - name: Upload web npm artifact
        uses: actions/upload-artifact@v6.0.0
        with:
          name: sipp-web-npm
          path: .build/artifacts/npm/sipp

      - name: Validate web npm publish
        env:
          NPM_TAG: ${{ inputs.npm_tag }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        working-directory: .build/artifacts/npm/sipp
        run: npm publish --dry-run --registry https://registry.npmjs.org --tag "$NPM_TAG"

  native:
    name: Build native packages
    needs: gate
    if: ${{ inputs.package == 'all' || inputs.package == 'node-npm' || inputs.package == 'python' || inputs.package == 'rust' }}
    permissions:
      contents: read
      packages: read
    uses: ./.github/workflows/build-native.yml
    with:
      package: ${{ inputs.package }}
      node-registry: https://registry.npmjs.org
      enforce: true

  node-npm:
    name: Assemble Node npm packages
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    needs: native
    if: ${{ inputs.package == 'all' || inputs.package == 'node-npm' }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v6.0.2
        with:
          submodules: false

      - name: Set up Node
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2.2.0
        with:
          bun-version: 1.3.11

      - name: Install JavaScript workspace dependencies
        run: bun install --frozen-lockfile

      - name: Download Node native artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: sipp-node-native-*
          path: .build/artifacts/node
          merge-multiple: true

      - name: Stage public Node server packages
        working-directory: lib/node
        env:
          SIPP_NODE_PACKAGE_ACCESS: public
          SIPP_NODE_PACKAGE_NAME: sipp-server
          SIPP_NODE_PACKAGE_REGISTRY: https://registry.npmjs.org
        run: bun run build:stage

      - name: Install staged packages and require router
        shell: bash
        run: |
          set -euo pipefail
          wrapper_dir=.build/artifacts/npm/sipp-server
          platform_dir=.build/artifacts/npm/sipp-server-linux-x64-gnu
          if [ ! -d "$platform_dir" ]; then
            echo "::error::Staged linux-x64-gnu platform package is missing."
            exit 1
          fi
          package_name="$(node -p "require('./$wrapper_dir/package.json').name")"
          smoke_dir="$RUNNER_TEMP/sipp-npm-smoke"
          rm -rf "$smoke_dir"
          mkdir -p "$smoke_dir"
          wrapper_tgz="$(npm pack "./$wrapper_dir" --pack-destination "$smoke_dir" --json | jq -r '.[0].filename')"
          platform_tgz="$(npm pack "./$platform_dir" --pack-destination "$smoke_dir" --json | jq -r '.[0].filename')"
          cd "$smoke_dir"
          npm init -y > /dev/null
          npm install --no-audit --no-fund --omit=optional "./$platform_tgz" "./$wrapper_tgz"
          SMOKE_PACKAGE_NAME="$package_name" SIPP_NODE_BACKEND=cpu node -e '
            const wrapper = require(process.env.SMOKE_PACKAGE_NAME);
            const backend = wrapper.getActiveBackend();
            if (backend !== "cpu") {
              throw new Error(`expected cpu backend from staged packages, got ${backend}`);
            }
            console.log(`Loaded ${process.env.SMOKE_PACKAGE_NAME} from staged tarballs with backend=${backend}`);
          '

      - name: Upload Node npm artifacts
        uses: actions/upload-artifact@v6.0.0
        with:
          name: sipp-server-npm
          path: |
            .build/artifacts/npm/sipp-server
            .build/artifacts/npm/sipp-server-*

      - name: Validate Node npm publish
        shell: bash
        env:
          NPM_TAG: ${{ inputs.npm_tag }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          for package_dir in .build/artifacts/npm/sipp-server-* .build/artifacts/npm/sipp-server; do
            [ -d "$package_dir" ] || continue
            npm publish "$package_dir" --dry-run --registry https://registry.npmjs.org --tag "$NPM_TAG"
          done

  python:
    name: Combine Python wheels
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    needs: native
    if: ${{ inputs.package == 'all' || inputs.package == 'python' }}
    steps:
      - name: Download Python wheel artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: sipp-python-wheels-*
          path: .build/artifacts/python
          merge-multiple: true

      - name: Upload combined Python wheel artifact
        uses: actions/upload-artifact@v6.0.0
        with:
          name: sipp-python-wheels
          path: .build/artifacts/python/*.whl

  rust-source:
    name: Package Rust source
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    needs: native
    if: ${{ inputs.package == 'all' || inputs.package == 'rust' }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v6.0.2
        with:
          # Keep the submodule out so the tarball stays facade-only; vendored
          # llama.cpp ships only after sign-off.
          submodules: false

      - name: Package Rust facade source artifact
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .build/artifacts/rust
          tar -czf .build/artifacts/rust/sipp-rust-source-${{ github.run_number }}.${{ github.run_attempt }}.tar.gz \
            Cargo.toml \
            Cargo.lock \
            README.md \
            LICENSE \
            crates/sipp \
            crates/sys \
            lib/gateway

      - name: Upload Rust crate artifact
        uses: actions/upload-artifact@v6.0.0
        with:
          name: sipp-rust-source
          path: .build/artifacts/rust/*.tar.gz

  # Tag and cut the GitHub Release *before* anything is pushed to a public
  # registry, so a published package always has a corresponding tag/Release.
  tag-release:
    name: Tag release and cut GitHub Release
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    needs:
      - preflight
      - web-npm
      - node-npm
      - python
      - rust-source
    if: ${{ inputs.dry_run == false && inputs.package == 'all' }}
    permissions:
      contents: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v6.0.2
        with:
          submodules: false

      - name: Download Python wheels
        uses: actions/download-artifact@v8
        with:
          name: sipp-python-wheels
          path: .build/release-assets

      - name: Download Rust source tarball
        uses: actions/download-artifact@v8
        with:
          name: sipp-rust-source
          path: .build/release-assets

      - name: Tag published version
        shell: bash
        env:
          RELEASE_TAG: ${{ needs.preflight.outputs.tag }}
        run: |
          set -euo pipefail
          if git ls-remote --exit-code --tags origin "refs/tags/$RELEASE_TAG" > /dev/null 2>&1; then
            echo "::error::Release tag $RELEASE_TAG already exists."
            exit 1
          fi
          git tag "$RELEASE_TAG"
          git push origin "$RELEASE_TAG"
          echo "Tagged $GITHUB_SHA as $RELEASE_TAG" >> "$GITHUB_STEP_SUMMARY"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.preflight.outputs.tag }}
          name: ${{ needs.preflight.outputs.tag }}
          generate_release_notes: true
          files: .build/release-assets/**

  publish-web:
    name: Publish web package to npm
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    needs:
      - web-npm
      - tag-release
    # always() tolerates tag-release being skipped on partial-package publishes
    # (e.g. package == web-npm), which deliberately do not cut a tag.
    if: ${{ always() && inputs.dry_run == false && needs.web-npm.result == 'success' && (needs.tag-release.result == 'success' || needs.tag-release.result == 'skipped') }}
    steps:
      - name: Set up Node
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Download web npm artifact
        uses: actions/download-artifact@v8
        with:
          name: sipp-web-npm
          path: .build/artifacts/npm/sipp

      - name: Publish web package to npm
        env:
          NPM_TAG: ${{ inputs.npm_tag }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        working-directory: .build/artifacts/npm/sipp
        run: npm publish --registry https://registry.npmjs.org --tag "$NPM_TAG"

  publish-node:
    name: Publish Node packages to npm
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    needs:
      - node-npm
      - tag-release
    if: ${{ always() && inputs.dry_run == false && needs.node-npm.result == 'success' && (needs.tag-release.result == 'success' || needs.tag-release.result == 'skipped') }}
    steps:
      - name: Set up Node
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Download Node npm artifacts
        uses: actions/download-artifact@v8
        with:
          name: sipp-server-npm
          path: .build/artifacts/npm

      - name: Publish Node packages to npm
        shell: bash
        env:
          NPM_TAG: ${{ inputs.npm_tag }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          for package_dir in .build/artifacts/npm/sipp-server-* .build/artifacts/npm/sipp-server; do
            [ -d "$package_dir" ] || continue
            npm publish "$package_dir" --registry https://registry.npmjs.org --tag "$NPM_TAG"
          done

  publish-python:
    name: Publish Python package to PyPI
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    needs:
      - python
      - tag-release
    if: ${{ always() && inputs.dry_run == false && needs.python.result == 'success' && (needs.tag-release.result == 'success' || needs.tag-release.result == 'skipped') }}
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Download combined Python wheels
        uses: actions/download-artifact@v8
        with:
          name: sipp-python-wheels
          path: .build/artifacts/python

      - name: Publish Python package to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: .build/artifacts/python
