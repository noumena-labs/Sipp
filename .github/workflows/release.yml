name: Release cogentlm packages

on:
  workflow_dispatch:
    inputs:
      package:
        description: Package endpoint to generate or publish
        required: true
        default: all
        type: choice
        options:
          - all
          - web-npm
          - node-npm
          - python
          - rust
      npm_tag:
        description: npm dist-tag to publish
        required: true
        default: latest
        type: string
      dry_run:
        description: Build and dry-run publish without publishing
        required: false
        default: true
        type: boolean

permissions:
  contents: read
  packages: read
  id-token: write

concurrency:
  group: release-cogentlm
  cancel-in-progress: false

jobs:
  release:
    name: Generate and publish release packages
    runs-on: ubuntu-latest
    env:
      CE_WASM_BUILD_PARALLEL_LEVEL: "2"
      SELECTED_PACKAGE: ${{ inputs.package }}
    steps:
      - name: Require master for publishing
        run: |
          set -euo pipefail
          if [ "${{ inputs.dry_run }}" = "false" ] && [ "${GITHUB_REF}" != "refs/heads/master" ]; then
            echo "::error::Publishing release packages must run from master."
            exit 1
          fi

      - name: Block unsupported Rust crates.io publish
        if: ${{ inputs.dry_run == false && (inputs.package == 'all' || inputs.package == 'rust') }}
        run: |
          echo "::error::Rust crates.io publishing is blocked until cogentlm-sys no longer depends on the private llama.cpp submodule path. Run a dry run to generate the Rust source artifact, or choose web-npm, node-npm, or python."
          exit 1

      - name: Check out repository
        uses: actions/checkout@v6.0.2
        with:
          submodules: false

      - name: Check out private llama.cpp submodule
        env:
          LLAMA_CPP_INTERNAL_DEPLOY_KEY: ${{ secrets.LLAMA_CPP_INTERNAL_DEPLOY_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${LLAMA_CPP_INTERNAL_DEPLOY_KEY:-}" ]; then
            echo "::error::Set LLAMA_CPP_INTERNAL_DEPLOY_KEY to a read-only deploy key for noumena-labs/llama.cpp."
            exit 1
          fi
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$LLAMA_CPP_INTERNAL_DEPLOY_KEY" > ~/.ssh/llama_cpp_internal
          chmod 600 ~/.ssh/llama_cpp_internal
          ssh-keyscan github.com >> ~/.ssh/known_hosts
          GIT_SSH_COMMAND="ssh -i ~/.ssh/llama_cpp_internal -o IdentitiesOnly=yes" git submodule sync --recursive
          GIT_SSH_COMMAND="ssh -i ~/.ssh/llama_cpp_internal -o IdentitiesOnly=yes" git submodule update --init --recursive

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-emscripten
          components: rust-src

      - name: Set up Node
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2.2.0
        with:
          bun-version: 1.3.11

      - name: Set up CMake and Ninja
        uses: lukka/get-cmake@latest

      - name: Set up Emscripten
        uses: emscripten-core/setup-emsdk@v16

      - name: Cache Cargo and native build outputs
        uses: actions/cache@v5.0.5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            .build/cargo
            .build/cmake
            .build/c
          key: cargo-release-${{ runner.os }}-${{ hashFiles('Cargo.lock', '.cargo/config.toml', 'crates/**/Cargo.toml', 'lib/**/Cargo.toml', 'apps/cli/Cargo.toml', 'xtask/Cargo.toml', 'bindings/**/Cargo.toml') }}
          restore-keys: |
            cargo-release-${{ runner.os }}-

      - name: Cache JavaScript dependencies
        uses: actions/cache@v5.0.5
        with:
          path: |
            ~/.bun/install/cache
            node_modules
            lib/web/node_modules
            lib/node/node_modules
            bindings/node/node_modules
            demos/*/node_modules
            tools/*/node_modules
            examples/web/node_modules
          key: bun-release-${{ runner.os }}-${{ hashFiles('bun.lock', 'bindings/node/bun.lock', 'package.json', 'lib/node/package.json', 'lib/web/package.json', 'bindings/node/package.json', 'demos/*/package.json', 'tools/*/package.json', 'examples/web/package.json') }}
          restore-keys: |
            bun-release-${{ runner.os }}-

      - name: Cache xtask toolchains
        uses: actions/cache@v5.0.5
        with:
          path: |
            .build/toolchain
            .build/uv-cache
          key: xtask-toolchain-release-${{ runner.os }}-${{ hashFiles('xtask/src/toolchains/*.rs') }}
          restore-keys: |
            xtask-toolchain-release-${{ runner.os }}-

      - name: Cache sample models
        uses: actions/cache@v5.0.5
        with:
          path: .build/models
          key: sample-models-release-${{ runner.os }}-${{ hashFiles('xtask/src/sample_model.rs') }}
          restore-keys: |
            sample-models-release-${{ runner.os }}-

      - name: Install JavaScript workspace dependencies
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bun install --frozen-lockfile

      - name: Run full release test workflow
        run: |
          cargo xtask --plain test unit group full
          cargo xtask --plain test smoke group full --backend cpu

      - name: Build staged web package
        if: ${{ inputs.package == 'all' || inputs.package == 'web-npm' }}
        run: cargo xtask --plain build wasm

      - name: Run web package import smoke
        if: ${{ inputs.package == 'all' || inputs.package == 'web-npm' }}
        run: |
          node --input-type=module <<'NODE'
          const pkg = await import('./.build/artifacts/npm/cogentlm/dist/esm/index.js');
          if (typeof pkg.CogentClient !== 'function') {
            throw new Error('CogentClient export is missing from the staged package.');
          }
          NODE

      - name: Prepare public web npm metadata
        if: ${{ inputs.package == 'all' || inputs.package == 'web-npm' }}
        working-directory: .build/artifacts/npm/cogentlm
        run: |
          node --input-type=module <<'NODE'
          import { readFileSync, writeFileSync } from 'node:fs';
          const pkg = JSON.parse(readFileSync('package.json', 'utf8'));
          pkg.name = 'cogentlm';
          pkg.publishConfig = { registry: 'https://registry.npmjs.org', access: 'public' };
          writeFileSync('package.json', `${JSON.stringify(pkg, null, 2)}\n`);
          NODE

      - name: Upload web npm artifact
        if: ${{ inputs.package == 'all' || inputs.package == 'web-npm' }}
        uses: actions/upload-artifact@v6.0.0
        with:
          name: cogentlm-web-npm
          path: .build/artifacts/npm/cogentlm

      - name: Validate web npm publish
        if: ${{ inputs.package == 'all' || inputs.package == 'web-npm' }}
        env:
          NPM_TAG: ${{ inputs.npm_tag }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        working-directory: .build/artifacts/npm/cogentlm
        run: npm publish --dry-run --registry https://registry.npmjs.org --tag "$NPM_TAG"

      - name: Publish web package to npm
        if: ${{ inputs.dry_run == false && (inputs.package == 'all' || inputs.package == 'web-npm') }}
        env:
          NPM_TAG: ${{ inputs.npm_tag }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        working-directory: .build/artifacts/npm/cogentlm
        run: npm publish --registry https://registry.npmjs.org --tag "$NPM_TAG"

      - name: Build Node server package
        if: ${{ inputs.package == 'all' || inputs.package == 'node-npm' }}
        run: cargo xtask --plain build node --backend all

      - name: Stage Node server package
        if: ${{ inputs.package == 'all' || inputs.package == 'node-npm' }}
        working-directory: lib/node
        run: bun run build:stage

      - name: Prepare public Node npm metadata
        if: ${{ inputs.package == 'all' || inputs.package == 'node-npm' }}
        working-directory: .build/artifacts/npm/cogentlm-server
        run: |
          node --input-type=module <<'NODE'
          import { readFileSync, writeFileSync } from 'node:fs';
          const pkg = JSON.parse(readFileSync('package.json', 'utf8'));
          pkg.name = 'cogentlm-server';
          pkg.publishConfig = { registry: 'https://registry.npmjs.org', access: 'public' };
          writeFileSync('package.json', `${JSON.stringify(pkg, null, 2)}\n`);
          NODE

      - name: Upload Node npm artifact
        if: ${{ inputs.package == 'all' || inputs.package == 'node-npm' }}
        uses: actions/upload-artifact@v6.0.0
        with:
          name: cogentlm-server-npm
          path: .build/artifacts/npm/cogentlm-server

      - name: Validate Node npm publish
        if: ${{ inputs.package == 'all' || inputs.package == 'node-npm' }}
        env:
          NPM_TAG: ${{ inputs.npm_tag }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        working-directory: .build/artifacts/npm/cogentlm-server
        run: npm publish --dry-run --registry https://registry.npmjs.org --tag "$NPM_TAG"

      - name: Publish Node package to npm
        if: ${{ inputs.dry_run == false && (inputs.package == 'all' || inputs.package == 'node-npm') }}
        env:
          NPM_TAG: ${{ inputs.npm_tag }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        working-directory: .build/artifacts/npm/cogentlm-server
        run: npm publish --registry https://registry.npmjs.org --tag "$NPM_TAG"

      - name: Build Python wheel
        if: ${{ inputs.package == 'all' || inputs.package == 'python' }}
        run: cargo xtask --plain build python --backend all

      - name: Validate Python wheel metadata
        if: ${{ inputs.package == 'all' || inputs.package == 'python' }}
        run: .build/toolchain/uv/uv tool run twine check .build/artifacts/python/*.whl

      - name: Upload Python wheel artifact
        if: ${{ inputs.package == 'all' || inputs.package == 'python' }}
        uses: actions/upload-artifact@v6.0.0
        with:
          name: cogentlm-python-wheels
          path: .build/artifacts/python/*.whl

      - name: Publish Python package to PyPI
        if: ${{ inputs.dry_run == false && (inputs.package == 'all' || inputs.package == 'python') }}
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: .build/artifacts/python

      - name: Package Rust facade source artifact
        if: ${{ inputs.package == 'all' || inputs.package == 'rust' }}
        run: |
          mkdir -p .build/artifacts/rust
          tar -czf .build/artifacts/rust/cogentlm-rust-source-${{ github.run_number }}.${{ github.run_attempt }}.tar.gz \
            Cargo.toml \
            Cargo.lock \
            README.md \
            LICENSE \
            lib/rust \
            crates/core \
            crates/shard \
            crates/sys \
            crates/engine \
            crates/remote \
            crates/gateway \
            crates/gateway-providers \
            crates/client

      - name: Upload Rust crate artifact
        if: ${{ inputs.package == 'all' || inputs.package == 'rust' }}
        uses: actions/upload-artifact@v6.0.0
        with:
          name: cogentlm-rust-source
          path: .build/artifacts/rust/*.tar.gz
