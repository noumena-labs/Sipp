[package]
name = "cogentlm-py"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true

[lib]
name = "_native"
crate-type = ["cdylib", "rlib"]

[features]
default = ["native"]
native = ["cogentlm-engine/native"]
cuda = ["cogentlm-engine/cuda"]
metal = ["cogentlm-engine/metal"]
vulkan = ["cogentlm-engine/vulkan"]
openmp = ["cogentlm-engine/openmp"]

[dependencies]
cogentlm-engine.workspace = true
cogentlm-providers.workspace = true
pyo3 = { workspace = true, features = ["abi3-py39", "extension-module"] }
serde.workspace = true
serde_json.workspace = true
tokio = { version = "1", features = ["rt-multi-thread", "time"] }

[dev-dependencies]
wiremock = "0.6"
