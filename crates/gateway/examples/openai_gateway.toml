[server]
bind = "127.0.0.1:8787"

[auth]
token_env = "COGENTLM_GATEWAY_TOKEN"

[limits]
max_request_bytes = 1048576

[cors]
allowed_origins = ["http://localhost:5173"]

[[aliases]]
name = "pro-chat"
operations = ["query", "chat", "embed"]

[aliases.limits]
max_concurrent_requests = 8
max_requests_per_minute = 120

[aliases.backend]
kind = "open_ai"
model = "gpt-5-mini"
api_key_env = "OPENAI_API_KEY"

