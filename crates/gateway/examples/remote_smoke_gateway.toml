[server]
bind = "127.0.0.1:8787"

[auth]
token_env = "COGENTLM_GATEWAY_TOKEN"

[limits]
max_request_bytes = 1048576

[cors]
allowed_origins = ["http://localhost:5173"]

# Provider credentials stay in the gateway process environment:
# OPENAI_API_KEY, ANTHROPIC_API_KEY, and GEMINI_API_KEY.
#
# Keep chat/query and embedding aliases separate. Embedding requests must use
# embedding-capable upstream models.

[[aliases]]
name = "openai-chat"
operations = ["chat"]

[aliases.limits]
max_concurrent_requests = 8
max_requests_per_minute = 120

[aliases.backend]
kind = "open_ai"
model = "gpt-5-mini"
api_key_env = "OPENAI_API_KEY"

[[aliases]]
name = "openai-embed"
operations = ["embed"]

[aliases.limits]
max_concurrent_requests = 8
max_requests_per_minute = 120

[aliases.backend]
kind = "open_ai"
model = "text-embedding-3-small"
api_key_env = "OPENAI_API_KEY"

[[aliases]]
name = "anthropic-text"
operations = ["query", "chat"]

[aliases.limits]
max_concurrent_requests = 8
max_requests_per_minute = 120

[aliases.backend]
kind = "anthropic"
model = "claude-sonnet-4-5"
api_key_env = "ANTHROPIC_API_KEY"

[[aliases]]
name = "gemini-chat"
operations = ["chat"]

[aliases.limits]
max_concurrent_requests = 8
max_requests_per_minute = 120

[aliases.backend]
kind = "open_ai_compatible"
model = "gemini-2.5-flash"
base_url = "https://generativelanguage.googleapis.com/v1beta/openai/"

[aliases.backend.auth]
kind = "bearer"
token_env = "GEMINI_API_KEY"

[[aliases]]
name = "gemini-embed"
operations = ["embed"]

[aliases.limits]
max_concurrent_requests = 8
max_requests_per_minute = 120

[aliases.backend]
kind = "open_ai_compatible"
model = "gemini-embedding-001"
base_url = "https://generativelanguage.googleapis.com/v1beta/openai/"

[aliases.backend.auth]
kind = "bearer"
token_env = "GEMINI_API_KEY"
