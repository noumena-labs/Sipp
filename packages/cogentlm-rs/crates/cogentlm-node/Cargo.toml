[package]
name = "cogentlm-node"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true

[lib]
name = "cogentlm_node"
crate-type = ["cdylib", "rlib"]

[features]
default = ["native"]
native = ["cogentlm-core/native"]
cuda = ["cogentlm-core/cuda"]
metal = ["cogentlm-core/metal"]
vulkan = ["cogentlm-core/vulkan"]
openmp = ["cogentlm-core/openmp"]

[dependencies]
cogentlm-core = { path = "../cogentlm-core" }
napi.workspace = true
napi-derive.workspace = true

[build-dependencies]
napi-build.workspace = true
