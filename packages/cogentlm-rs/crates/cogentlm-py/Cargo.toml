[package]
name = "cogentlm-py"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true

[lib]
name = "_native"
crate-type = ["cdylib", "rlib"]

[features]
default = ["native"]
native = ["cogentlm-engine/native"]
cuda = ["cogentlm-engine/cuda"]
metal = ["cogentlm-engine/metal"]
vulkan = ["cogentlm-engine/vulkan"]
openmp = ["cogentlm-engine/openmp"]

[dependencies]
cogentlm-engine = { path = "../cogentlm-engine" }
pyo3 = { workspace = true, features = ["abi3-py39", "extension-module"] }
