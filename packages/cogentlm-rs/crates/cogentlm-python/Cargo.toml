[package]
name = "cogentlm-python"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true

[lib]
name = "_native"
crate-type = ["cdylib", "rlib"]

[features]
default = ["native"]
native = ["cogentlm-core/native"]
cuda = ["cogentlm-core/cuda"]
metal = ["cogentlm-core/metal"]
vulkan = ["cogentlm-core/vulkan"]
openmp = ["cogentlm-core/openmp"]

[dependencies]
cogentlm-core = { path = "../cogentlm-core" }
pyo3 = { workspace = true, features = ["abi3-py39", "extension-module"] }
