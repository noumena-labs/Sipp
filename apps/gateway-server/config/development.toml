public_bind = "127.0.0.1:8080"
management_bind = "127.0.0.1:9090"
max_request_bytes = 1048576
max_concurrent_requests = 2
allowed_origins = ["http://localhost:5173", "http://127.0.0.1:5173"]
admin_password = "replace-me"

[security.client_ip]
source = "peer"
trusted_proxy_cidrs = []

[security.rate_limit]
enabled = false
requests_per_minute = 60
burst = 60

[routes]
query = "/v1/query"
chat = "/v1/chat"
embed = "/v1/embed"
index = "/"
health = "/healthz"
readiness = "/readyz"
metrics = "/metrics"
admin = "/admin"

[[tokens]]
env = "COGENTLM_GATEWAY_TOKEN"
caller = "local-development"
targets = ["local"]

[[targets]]
name = "local"
type = "local"
model = ".build/models/qwen2.5-0.5b-instruct-q4_0.gguf"
backend = "auto"
stats = "basic"
