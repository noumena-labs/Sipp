upstream sipp_gateway {
    server gateway:8080;
    keepalive 32;
}

server {
    listen 443 ssl;
    server_name gateway.example.com;

    # Configure ssl_certificate and ssl_certificate_key for your environment.

    # Keep this path aligned with the application-owned public routes.
    location /v1/ {
        proxy_pass http://sipp_gateway;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Request-Id $request_id;

        # SSE must not be buffered. Long generations need a generous idle timeout.
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 10m;
        proxy_send_timeout 10m;
    }
}
