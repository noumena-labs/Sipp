services:
  gateway:
    build:
      context: ../..
      dockerfile: apps/gateway-server/Dockerfile
    environment:
      COGENTLM_GATEWAY_TOKEN: ${COGENTLM_GATEWAY_TOKEN:?required}
      RUST_LOG: ${RUST_LOG:-info}
    volumes:
      - ./config/production.toml:/etc/cogentlm/gateway.toml:ro
      - ${COGENTLM_MODEL_DIR:-../../.build/models}:/models:ro
    ports:
      - "8080:8080"
      - "127.0.0.1:9090:9090"
    stop_grace_period: 130s
    healthcheck:
      test: ["CMD", "curl", "--fail", "--silent", "http://127.0.0.1:9090/readyz"]
      interval: 10s
      timeout: 3s
      retries: 6
      start_period: 120s
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
