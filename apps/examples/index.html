<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cogent Engine - Minimal Examples</title>
  <link rel="stylesheet" href="/src/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body class="dark-theme">
  <div id="app">
    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="logo">
          <span class="logo-text">Cogent</span><span class="logo-suffix">Engine</span>
        </div>
      </div>
      <nav class="example-nav">
        <button class="nav-item active" data-example="01-basic-chat">
          <span class="icon">💬</span>
          <span class="label">Basic Chat</span>
        </button>
        <button class="nav-item" data-example="02-multimodal">
          <span class="icon">👁️</span>
          <span class="label">Multimodal Vision</span>
        </button>
        <button class="nav-item" data-example="03-structured-output">
          <span class="icon">📋</span>
          <span class="label">Structured Output</span>
        </button>
        <button class="nav-item" data-example="04-observability">
          <span class="icon">📈</span>
          <span class="label">Observability</span>
        </button>
        <button class="nav-item" data-example="05-query">
          <span class="icon">Q</span>
          <span class="label">Query</span>
        </button>
        <button class="nav-item" data-example="06-embeddings">
          <span class="icon">E</span>
          <span class="label">Embeddings</span>
        </button>
      </nav>
      <div class="sidebar-footer">
        <div class="status-indicator">
          <div class="status-dot disconnected"></div>
          <span class="status-text">Engine Not Ready</span>
        </div>
      </div>
    </aside>
    
    <main class="main-content">
      <header class="content-header">
        <h1 id="example-title">Basic Chat</h1>
        <p id="example-description">A simple demonstration of the chat API with streaming support.</p>
      </header>
      
      <div class="interaction-container">
        <div class="control-panel">
          <div class="input-group">
            <label for="model-url">Model URL</label>
            <input type="text" id="model-url" placeholder="Model GGUF URL" value="https://huggingface.co/Qwen/Qwen2.5-0.5B-Instruct-GGUF/resolve/main/qwen2.5-0.5b-instruct-q8_0.gguf">
          </div>
          <div class="input-group file-group">
            <label for="model-file">Model File</label>
            <input type="file" id="model-file" accept=".gguf">
          </div>
          <div class="input-group hidden" id="projector-group">
            <label for="projector-url">Projector URL (Vision)</label>
            <input type="text" id="projector-url" placeholder="Projector GGUF URL" value="https://huggingface.co/LiquidAI/LFM2.5-VL-450M-GGUF/resolve/main/mmproj-model-f16.gguf">
            <input type="file" id="projector-file" accept=".gguf">
          </div>
          <button id="init-engine-btn" class="btn primary">Initialize & Load</button>
        </div>
        
        <div class="console-wrapper">
          <div class="console-header">
            <span>Terminal Output</span>
            <button id="clear-console-btn" class="btn text-btn">Clear</button>
          </div>
          <div id="console-output" class="console-content">
            <div class="console-line system">Welcome to Cogent Engine Examples. Select an example and click "Initialize & Load" to begin.</div>
          </div>
          <div id="image-preview-area" class="hidden">
            <div class="preview-item">
              <img id="image-preview" src="" alt="Preview">
              <button id="remove-image-btn" class="remove-btn">&times;</button>
            </div>
          </div>
          <div class="console-input-area">
            <input type="file" id="file-input" accept="image/*" class="hidden">
            <button id="upload-btn" class="btn icon-btn secondary" title="Upload Image" disabled>
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>
            </button>
            <input type="text" id="user-input" placeholder="Type your message here..." disabled>
            <button id="send-btn" class="btn icon-btn" disabled>
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
            </button>
          </div>
        </div>
      </div>
    </main>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
